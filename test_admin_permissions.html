<!DOCTYPE html>
<html>
<head>
    <title>Test Admin Functions Permissions</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test-section { margin: 20px 0; padding: 15px; background: white; border-radius: 8px; }
        .result { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .permissions-demo { 
            display: inline-block; 
            padding: 2px 6px; 
            border-radius: 10px; 
            font-size: 0.7em; 
            font-weight: 600; 
            margin: 2px;
        }
        .has { background: #10b981; color: white; }
        .none { background: #6b7280; color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <h1>Test Admin Functions Permissions</h1>
    
    <div class="test-section">
        <h3>Test Different Admin Users</h3>
        <button onclick="testUser('123456789')">Test User 123456789 (3 права)</button>
        <button onclick="testUser('987654321')">Test User 987654321 (2 права)</button>
        <button onclick="testUser('555666777')">Test User 555666777 (3 права)</button>
        <button onclick="testUser('111222333')">Test User 111222333 (5 прав)</button>
        <button onclick="testUser('444555666')">Test User 444555666 (0 прав)</button>
        <button onclick="testUser('999999999')">Test User 999999999 (нет в базе)</button>
        <div id="result"></div>
    </div>

    <div class="test-section">
        <h3>Expected Results Preview:</h3>
        <div>
            User 123456789: <span class="permissions-demo has">Права: 3</span>
            User 987654321: <span class="permissions-demo has">Права: 2</span>
            User 555666777: <span class="permissions-demo has">Права: 3</span>
            User 111222333: <span class="permissions-demo has">Права: 5</span>
            User 444555666: <span class="permissions-demo none">Нет прав</span>
            User 999999999: <span class="permissions-demo none">Нет прав</span>
        </div>
    </div>

    <script>
        async function testUser(userId) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="result">Testing...</div>';
            
            try {
                const response = await fetch(`https://ezh-dev.ru:3000/user_permissions/1002143434937/${userId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const perms = data.data;
                    const activeRights = Object.values(perms).filter(p => p === true).length;
                    
                    let badgeClass = activeRights > 0 ? 'has' : 'none';
                    let badgeText = activeRights > 0 ? `Права: ${activeRights}` : 'Нет прав';
                    
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h4>✅ User ${userId} Permissions:</h4>
                            <p>Has permissions: ${perms.has_permissions}</p>
                            <p>Active rights: ${activeRights}</p>
                            <p>Badge: <span class="permissions-demo ${badgeClass}">${badgeText}</span></p>
                            <ul>
                                <li>Can see users: ${perms.can_see_users}</li>
                                <li>Can do admin: ${perms.can_do_admin}</li>
                                <li>Can recommend: ${perms.can_recom}</li>
                                <li>Can manage links: ${perms.can_links}</li>
                                <li>Can manage DK: ${perms.can_dk}</li>
                            </ul>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ Error: ${data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Network Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
