<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка пользователя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .user-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #7c4dff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3), inset 0 0 20px rgba(124, 77, 255, 0.1);
        }
        .user-name {
            font-size: 2em;
            color: #b388ff;
            text-shadow: 0 0 10px #b388ff;
            margin-bottom: 20px;
            text-align: center;
        }
        .user-info {
            color: #e0e0e0;
            line-height: 2;
            font-size: 1.1em;
        }
        .label {
            color: #7c4dff;
            font-weight: bold;
        }
        .user-status {
            margin-top: 10px;
            font-size: 1.05em;
            color: #9ccc65;
            text-align: center;
            text-shadow: 0 0 10px rgba(156, 204, 101, 0.7);
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
            height: 51px;
            max-width: calc(100vw - 40px);
            overflow: hidden;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            flex: 0 0 35px;
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
            flex: 0 0 35px;
        }

        .user-name-profile {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
                height: 44px;
                max-width: calc(100vw - 20px);
            }

            .user-avatar {
                width: 30px;
                height: 30px;
                flex: 0 0 30px;
            }

            .user-avatar-fallback {
                width: 30px;
                height: 30px;
                flex: 0 0 30px;
                font-size: 0.8em;
            }

            .user-name-profile {
                font-size: 0.8em;
                max-width: 100px;
            }
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }
        .action-btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
        }
        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }
        .action-btn.ban { background: linear-gradient(145deg, #ff9800, #ffc107); border-color: #ffc107; }
        .action-btn.delete { background: linear-gradient(145deg, #f44336, #e91e63); border-color: #e91e63; }
        .action-btn.full-delete { background: linear-gradient(145deg, #9c27b0, #673ab7); border-color: #673ab7; }
        .ban-form {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #7c4dff;
            display: none;
        }
        .ban-form label {
            display: block;
            color: #b388ff;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .ban-form input {
            width: 100%;
            padding: 10px;
            background: #1a1a2e;
            border: 2px solid #7c4dff;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            margin-bottom: 15px;
        }
        .ban-form button {
            width: 100%;
            background: linear-gradient(145deg, #ff9800, #ffc107);
            border: 2px solid #ffc107;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.4);
            transition: all 0.3s ease;
        }
        .ban-form button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255, 152, 0, 0.7);
        }
        .recommendations-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #7c4dff;
        }
        .warnings-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #ff9800;
        }
        .warnings-title {
            font-size: 1.5em;
            color: #ffc107;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px #ff9800;
        }
        .no-warnings {
            text-align: center;
            color: #bbb;
            font-size: 1.1em;
            padding: 20px;
            background: rgba(255, 152, 0, 0.08);
            border-radius: 10px;
            border: 1px solid rgba(255, 193, 7, 0.8);
        }
        .warnings-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .warning-card {
            background: radial-gradient(circle at top left, rgba(255, 193, 7, 0.18), rgba(26, 26, 46, 0.95));
            border: 2px solid rgba(255, 193, 7, 0.9);
            border-radius: 10px;
            padding: 18px 20px;
            box-shadow: 0 0 18px rgba(255, 193, 7, 0.4);
            transition: all 0.3s ease;
        }
        .warning-card:hover {
            background: radial-gradient(circle at top left, rgba(255, 193, 7, 0.26), rgba(26, 26, 46, 1));
            box-shadow: 0 0 26px rgba(255, 193, 7, 0.7);
            transform: translateY(-2px);
        }
        .warning-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .warning-card-title {
            font-size: 1.15em;
            color: #ffeb3b;
            font-weight: bold;
        }
        .warning-card-body {
            color: #f5f5f5;
            line-height: 1.7;
        }
        .warning-field {
            margin-bottom: 6px;
        }
        .warning-field-label {
            color: #ffc107;
            font-weight: 600;
            display: inline-block;
            min-width: 110px;
        }
        .warning-remove-btn {
            margin-top: 10px;
            padding: 0 16px;
            height: 0;
            border-radius: 8px;
            border: 1px solid #ffc107;
            background: linear-gradient(145deg, #ff9800, #ffc107);
            color: #111;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
            box-shadow: 0 0 0 rgba(255, 193, 7, 0.0);
            opacity: 0;
            overflow: hidden;
            transform: scale(0.9);
            transition: height 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, padding-top 0.2s ease, padding-bottom 0.2s ease;
        }
        .warning-remove-btn.visible {
            height: 32px;
            padding-top: 8px;
            padding-bottom: 8px;
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
        }
        .warning-remove-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 16px rgba(255, 193, 7, 0.8);
        }
        .warning-removed-icon {
            margin-top: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #ffc107;
            color: #111;
            background: radial-gradient(circle at top left, rgba(255, 235, 59, 0.9), rgba(255, 193, 7, 0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            box-shadow: 0 0 0 rgba(255, 193, 7, 0.0);
            opacity: 0;
            transform: scale(0.4) rotate(-20deg);
            animation: warningCheckAppear 0.4s ease-out forwards;
        }
        @keyframes warningCheckAppear {
            0% {
                opacity: 0;
                transform: scale(0.4) rotate(-20deg) translateY(10px);
                box-shadow: 0 0 0 rgba(255, 193, 7, 0.0);
            }
            60% {
                opacity: 1;
                transform: scale(1.1) rotate(5deg) translateY(0);
                box-shadow: 0 0 14px rgba(255, 193, 7, 0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg) translateY(0);
                box-shadow: 0 0 8px rgba(255, 193, 7, 0.7);
            }
        }
        .warning-field-value a {
            color: #ffeb3b;
            text-decoration: none;
        }
        .warning-field-value a:hover {
            text-decoration: underline;
        }
        .recommendation-remove-btn {
            margin-top: 10px;
            padding: 0 16px;
            height: 0;
            border-radius: 8px;
            border: 1px solid #b388ff;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
            box-shadow: 0 0 0 rgba(124, 77, 255, 0.0);
            opacity: 0;
            overflow: hidden;
            transform: scale(0.9);
            transition: height 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, padding-top 0.2s ease, padding-bottom 0.2s ease;
        }
        .recommendation-remove-btn.visible {
            height: 32px;
            padding-top: 8px;
            padding-bottom: 8px;
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.5);
        }
        .recommendation-remove-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 16px rgba(124, 77, 255, 0.8);
        }
        .recommendation-removed-icon {
            margin-top: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #b388ff;
            color: #050510;
            background: radial-gradient(circle at top left, rgba(179, 136, 255, 0.9), rgba(124, 77, 255, 0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            box-shadow: 0 0 0 rgba(124, 77, 255, 0.0);
            opacity: 0;
            transform: scale(0.4) rotate(-20deg);
            animation: recommendationCheckAppear 0.4s ease-out forwards;
        }
        @keyframes recommendationCheckAppear {
            0% {
                opacity: 0;
                transform: scale(0.4) rotate(-20deg) translateY(10px);
                box-shadow: 0 0 0 rgba(124, 77, 255, 0.0);
            }
            60% {
                opacity: 1;
                transform: scale(1.1) rotate(5deg) translateY(0);
                box-shadow: 0 0 14px rgba(124, 77, 255, 0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg) translateY(0);
                box-shadow: 0 0 8px rgba(124, 77, 255, 0.7);
            }
        }
        .recommendation-field-value a {
            color: #ffeb3b;
            text-decoration: none;
        }
        .recommendation-field-value a:hover {
            text-decoration: underline;
        }
        .recommendations-title {
            font-size: 1.5em;
            color: #b388ff;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px #b388ff;
        }
        .no-recommendations {
            text-align: center;
            color: #999;
            font-size: 1.1em;
            padding: 20px;
            background: rgba(124, 77, 255, 0.1);
            border-radius: 10px;
            border: 1px solid #7c4dff;
        }
        .recommendations-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .recommendation-card {
            background: rgba(124, 77, 255, 0.1);
            border: 2px solid #7c4dff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.2);
            transition: all 0.3s ease;
        }
        .recommendation-card:hover {
            background: rgba(124, 77, 255, 0.2);
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.4);
            transform: translateY(-2px);
        }
        .recommendation-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .recommendation-card-title {
            font-size: 1.2em;
            color: #b388ff;
            font-weight: bold;
        }
        .recommendation-card-date {
            color: #7c4dff;
            font-size: 0.9em;
        }
        .recommendation-card-body {
            color: #e0e0e0;
            line-height: 1.8;
        }
        .recommendation-field {
            margin-bottom: 10px;
        }
        .recommendation-field-label {
            color: #7c4dff;
            font-weight: bold;
            display: inline-block;
            min-width: 150px;
        }
        .recommendation-field-value {
            color: #fff;
        }
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .tg-logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: 0 0 30px rgba(124, 77, 255, 0.6);
            animation: flyAway 1.5s ease-in-out forwards;
        }
        @keyframes flyAway {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            30% {
                transform: scale(1.2) rotate(180deg);
                opacity: 1;
            }
            70% {
                transform: scale(1) rotate(360deg);
                opacity: 1;
            }
            100% {
                transform: scale(0) translateY(-500px) rotate(720deg);
                opacity: 0;
            }
        }
        .toast {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.92);
            border: 1px solid rgba(124, 77, 255, 0.55);
            box-shadow: 0 0 22px rgba(124, 77, 255, 0.22);
            color: #fff;
            padding: 12px 14px;
            border-radius: 14px;
            z-index: 2000;
            max-width: min(560px, calc(100vw - 24px));
            display: none;
            backdrop-filter: blur(10px);
        }

        .toast.error {
            border-color: rgba(255, 82, 82, 0.6);
            box-shadow: 0 0 22px rgba(255, 82, 82, 0.18);
        }

        .toast-title {
            font-weight: 800;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .toast-text {
            opacity: 0.95;
            font-size: 0.9em;
            line-height: 1.35;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name-profile"></div>
    </div>

    <div id="toast" class="toast error" role="status" aria-live="polite">
        <div class="toast-title">Ошибка</div>
        <div id="toastText" class="toast-text"></div>
    </div>
    
    <!-- Success Overlay -->
    <div id="successOverlay" class="success-overlay">
        <div class="tg-logo">✓</div>
    </div>
    
    <a href="#" class="back-btn" id="backBtn">←</a>
    <h1>Карточка пользователя</h1>
    <div class="container">
        <div class="user-card" id="userCard"></div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        const backBtn = document.querySelector('.back-btn');
                        if (backBtn) backBtn.click();
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        // Глобальная переменная для хранения данных пользователя
        let currentUser = null;

        // Функция для получения данных пользователя
        function getCurrentUser() {
            if (currentUser) return currentUser;
            
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    language_code: tg.initDataUnsafe.user.language_code || 'ru',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
                console.log('User data loaded:', currentUser);
            } else {
                console.warn('Telegram WebApp user data not available');
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            if (user.photo_url) {
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                avatar.style.display = 'none';
            }

            profile.style.display = 'flex';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const chat = urlParams.get('chat');
        const userId = urlParams.get('id');

        updateUserProfile();
        
        document.getElementById('backBtn').href = `users.html?chat=${chat}`;
        
        fetch(`https://ezh-dev.ru:8000/users/${chat}`)
            .then(res => res.json())
            .then(users => {
                const user = Object.values(users).find(u => u.tg_ids == userId);
                if (user) {
                    let userCardHTML = `
                        <div class="user-name">${user.name} (@${user.username || 'без username'})</div>
                        ${user.status ? `<div class="user-status">${user.status}</div>` : ''}
                        <div class="user-info">
                            <span class="label">ID:</span> ${user.tg_ids}<br>
                            <span class="label">Возраст:</span> ${user.age}<br>
                            <span class="label">Ник PUBG:</span> ${user.nik_pubg} (ID: ${user.id_pubg})<br>
                            <span class="label">Ник:</span> ${user.nik}<br>
                            <span class="label">Ранг:</span> ${user.rang}<br>
                            <span class="label">Последние сообщение:</span> ${user.last_date}<br>
                            <span class="label">Дата входа:</span> ${user.date_vhod}<br>
                            <span class="label">Количество сообщений:</span> ${user.mess_count}
                        </div>
                        <div class="action-buttons">
                            <button class="action-btn ban" onclick="showBanForm()">Бан</button>
                            <button class="action-btn delete" onclick="deleteUser()">Удалить с БД</button>
                            <button class="action-btn full-delete" onclick="fullDeleteUser()">Удалить полностью</button>
                        </div>
                        <div class="ban-form" id="banForm">
                            <label>Причина</label>
                            <input type="text" id="banReason" placeholder="Введите причину бана">
                            <button onclick="banUser()">Забанить</button>
                        </div>
                    `;
                    document.getElementById('userCard').innerHTML = userCardHTML;
                    loadWarnings();
                    loadRecommendations();
                }
            });
        
        function showBanForm() {
            document.getElementById('banForm').style.display = 'block';
        }

        async function fetchJsonOrThrow(url, options) {
            const r = await fetch(url, options);
            const data = await r.json().catch(() => null);
            if (!r.ok) {
                const msg = data && (data.detail || data.error) ? (data.detail || data.error) : `Ошибка ${r.status}`;
                throw new Error(msg);
            }
            return data;
        }

        let toastTimer = null;
        function showError(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) {
                alert(message || 'Ошибка');
                return;
            }
            toastText.textContent = message || 'Ошибка';
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        function loadWarnings() {
            fetch(`https://ezh-dev.ru:8000/warns/${chat}/${userId}`)
                .then(res => res.json())
                .then(data => {
                    const userCard = document.getElementById('userCard');
                    // На всякий случай: чтобы не дублировать блок при повторном вызове
                    const existingSection = userCard.querySelector('.warnings-section');
                    if (existingSection) existingSection.remove();

                    const warningsSection = document.createElement('div');
                    warningsSection.className = 'warnings-section';
                    warningsSection.innerHTML = '<div class="warnings-title">⚠️ Предупреждения</div>';

                    const warnsArray = Array.isArray(data) ? data : Object.values(data || {});
                    const warns = (warnsArray || []).slice(0, 3);

                    if (!warns || warns.length === 0) {
                        warningsSection.innerHTML += '<div class="no-warnings">Предупреждений нет</div>';
                    } else {
                        const list = document.createElement('div');
                        list.className = 'warnings-list';

                        let openedWarningButton = null;

                        warns.forEach((w, index) => {
                            const card = document.createElement('div');
                            card.className = 'warning-card';

                            const num = w?.num ?? (index + 1);
                            const reason = (w?.reason ?? '').toString().trim();
                            const moder = (w?.moder ?? '').toString().trim();

                            card.innerHTML = `
                                <div class="warning-card-header">
                                    <div class="warning-card-title">Предупреждение #${num}</div>
                                </div>
                                <div class="warning-card-body">
                                    <div class="warning-field">
                                        <span class="warning-field-label">Причина:</span>
                                        <span class="warning-field-value">${reason}</span>
                                    </div>
                                    <div class="warning-field">
                                        <span class="warning-field-label">Модератор:</span>
                                        <span class="warning-field-value">${moder}</span>
                                    </div>
                                    <button class="warning-remove-btn" data-warn-num="${num}">Снять</button>
                                </div>
                            `;

                            // При клике на карточку плавно показываем кнопку "Снять"
                            card.addEventListener('click', (e) => {
                                const btn = card.querySelector('.warning-remove-btn');
                                if (!btn) return;
                                // Не всплываем, если клик по самой кнопке
                                if (e.target === btn) return;
                                // Закрываем ранее открытую кнопку, если она есть и это не текущая
                                if (openedWarningButton && openedWarningButton !== btn) {
                                    openedWarningButton.classList.remove('visible');
                                }
                                // Тогглим текущую
                                const isVisible = btn.classList.contains('visible');
                                if (isVisible) {
                                    btn.classList.remove('visible');
                                    openedWarningButton = null;
                                } else {
                                    btn.classList.add('visible');
                                    openedWarningButton = btn;
                                }
                            });

                            // Нажатие на кнопку "Снять" отправляет POST-запрос
                            card.querySelector('.warning-remove-btn').addEventListener('click', (e) => {
                                e.stopPropagation();
                                const btn = e.currentTarget;
                                const warnNum = parseInt(btn.getAttribute('data-warn-num')) || num;
                                const admin = getCurrentUser();
                                if (!admin) {
                                    showError('Не удалось получить данные профиля Telegram. Открой страницу внутри Telegram Mini App.');
                                    return;
                                }
                                fetchJsonOrThrow('https://ezh-dev.ru:8000/snat_warn', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        chat: chat,
                                        userid: userId,
                                        num: warnNum,
                                        admin_id: admin.id,
                                        admin_name: `${admin.first_name} ${admin.last_name}`.trim() || admin.username,
                                        admin_username: admin.username
                                    })
                                }).then(() => {
                                    // Анимированная галочка и плавное удаление карточки
                                    btn.classList.remove('visible');
                                    btn.disabled = true;
                                    openedWarningButton = null;

                                    const icon = document.createElement('div');
                                    icon.className = 'warning-removed-icon';
                                    icon.textContent = '✓';
                                    card.appendChild(icon);

                                    setTimeout(() => {
                                        card.remove();
                                        // Если предупреждений больше нет — показать текст
                                        if (!list.querySelector('.warning-card')) {
                                            const existingNoWarn = warningsSection.querySelector('.no-warnings');
                                            if (!existingNoWarn) {
                                                warningsSection.innerHTML += '<div class="no-warnings">Предупреждений нет</div>';
                                            }
                                        }
                                    }, 450);
                                }).catch((err) => {
                                    showError(err?.message || 'Ошибка');
                                });
                            });

                            list.appendChild(card);
                        });

                        warningsSection.appendChild(list);
                    }

                    userCard.appendChild(warningsSection);
                })
                .catch(err => {
                    console.error('Ошибка при загрузке предупреждений:', err);
                    const userCard = document.getElementById('userCard');
                    const existingSection = userCard.querySelector('.warnings-section');
                    if (existingSection) existingSection.remove();
                    const warningsSection = document.createElement('div');
                    warningsSection.className = 'warnings-section';
                    warningsSection.innerHTML = '<div class="no-warnings">Ошибка при загрузке предупреждений</div>';
                    userCard.appendChild(warningsSection);
                });
        }

        function loadRecommendations() {
            fetch(`https://ezh-dev.ru:8000/recom/${chat}/${userId}`)
                .then(res => res.json())
                .then(data => {
                    const userCard = document.getElementById('userCard');
                    // На всякий случай: если функция вызовется повторно — не дублируем блок
                    const existingSection = userCard.querySelector('.recommendations-section');
                    if (existingSection) existingSection.remove();

                    // API может вернуть как массив, так и объект (например, {"0": {...}, "1": {...}})
                    const recommendations = Array.isArray(data) ? data : Object.values(data || {});

                    const recommendationsSection = document.createElement('div');
                    recommendationsSection.className = 'recommendations-section';
                    recommendationsSection.innerHTML = '<div class="recommendations-title">📋 Рекомендации</div>';
                    
                    if (!recommendations || recommendations.length === 0) {
                        recommendationsSection.innerHTML += '<div class="no-recommendations">Рекомендации отсутствуют</div>';
                    } else {
                        const recList = document.createElement('div');
                        recList.className = 'recommendations-list';
                        
                        recommendations.forEach((rec, index) => {
                            const recCard = document.createElement('div');
                            recCard.className = 'recommendation-card';
                            
                            // Парсим дату в формате "01.12.2025"
                            const dateStr = (rec?.date ?? '').toString().trim();
                            const recDate = dateStr;
                            
                            recCard.innerHTML = `
                                <div class="recommendation-card-header">
                                    <div class="recommendation-card-title">Рекомендация #${index + 1}</div>
                                    <div class="recommendation-card-date">${recDate}</div>
                                </div>
                                <div class="recommendation-card-body">
                                    <div class="recommendation-field">
                                        <span class="recommendation-field-label">PUBG ID:</span>
                                        <span class="recommendation-field-value">${rec?.pubg_id ?? ''}</span>
                                    </div>
                                    <div class="recommendation-field">
                                        <span class="recommendation-field-label">ID модератора:</span>
                                        <span class="recommendation-field-value">${rec?.moder_id ?? ''}</span>
                                    </div>
                                    <div class="recommendation-field">
                                        <span class="recommendation-field-label">Причина:</span>
                                        <span class="recommendation-field-value">${(rec?.reason ?? '').toString().trim()}</span>
                                    </div>
                                    <div class="recommendation-field">
                                        <span class="recommendation-field-label">Ранг:</span>
                                        <span class="recommendation-field-value">${(rec?.rang ?? '').toString().trim()}</span>
                                    </div>
                                    <div class="recommendation-field">
                                        <span class="recommendation-field-label">ID рекомендации:</span>
                                        <span class="recommendation-field-value">${rec?.rec_id ?? ''}</span>
                                    </div>
                                    <button class="recommendation-remove-btn" data-rec-id="${rec?.rec_id ?? ''}">Снять</button>
                                </div>
                            `;
                            
                            // Add click handler to show/hide remove button
                            let openedRecommendationButton = null;
                            
                            recCard.addEventListener('click', (e) => {
                                const btn = recCard.querySelector('.recommendation-remove-btn');
                                if (!btn) return;
                                // Don't bubble if clicked on button
                                if (e.target === btn) return;
                                // Close previously opened button
                                if (openedRecommendationButton && openedRecommendationButton !== btn) {
                                    openedRecommendationButton.classList.remove('visible');
                                }
                                // Toggle current button
                                const isVisible = btn.classList.contains('visible');
                                if (isVisible) {
                                    btn.classList.remove('visible');
                                    openedRecommendationButton = null;
                                } else {
                                    btn.classList.add('visible');
                                    openedRecommendationButton = btn;
                                }
                            });
                            
                            // Add click handler to remove button
                            recCard.querySelector('.recommendation-remove-btn').addEventListener('click', (e) => {
                                e.stopPropagation();
                                const btn = e.currentTarget;
                                const recId = btn.getAttribute('data-rec-id');
                                const admin = getCurrentUser();
                                if (!admin) {
                                    showError('Не удалось получить данные профиля Telegram. Открой страницу внутри Telegram Mini App.');
                                    return;
                                }
                                fetchJsonOrThrow('https://ezh-dev.ru:8000/recom-remove', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        rec_id: recId,
                                        user_id: userId,
                                        admin_id: admin.id,
                                        admin_name: `${admin.first_name} ${admin.last_name}`.trim() || admin.username,
                                        admin_username: admin.username
                                    })
                                }).then(() => {
                                    // Animate checkmark and remove card
                                    btn.classList.remove('visible');
                                    btn.disabled = true;
                                    openedRecommendationButton = null;
                                    
                                    const icon = document.createElement('div');
                                    icon.className = 'recommendation-removed-icon';
                                    icon.textContent = '✓';
                                    recCard.appendChild(icon);
                                    
                                    setTimeout(() => {
                                        recCard.remove();
                                        // If no recommendations left, show message
                                        if (!recList.querySelector('.recommendation-card')) {
                                            const existingNoRec = recommendationsSection.querySelector('.no-recommendations');
                                            if (!existingNoRec) {
                                                recommendationsSection.innerHTML += '<div class="no-recommendations">Рекомендации отсутствуют</div>';
                                            }
                                        }
                                    }, 450);
                                }).catch((err) => {
                                    showError(err?.message || 'Ошибка');
                                });
                            });
                            
                            recList.appendChild(recCard);
                        });
                        
                        recommendationsSection.appendChild(recList);
                    }
                    
                    userCard.appendChild(recommendationsSection);
                })
                .catch(err => {
                    console.error('Ошибка при загрузке рекомендаций:', err);
                    const userCard = document.getElementById('userCard');
                    const existingSection = userCard.querySelector('.recommendations-section');
                    if (existingSection) existingSection.remove();
                    const recommendationsSection = document.createElement('div');
                    recommendationsSection.className = 'recommendations-section';
                    recommendationsSection.innerHTML = '<div class="no-recommendations">Ошибка при загрузке рекомендаций</div>';
                    userCard.appendChild(recommendationsSection);
                });
        }
    </script>
