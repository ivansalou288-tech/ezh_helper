<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекомендации</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 95px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-content {
            padding: 20px;
            margin-top: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 135px);
            justify-content: flex-start;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2em;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .menu-card {
            background: linear-gradient(145deg, rgba(124, 77, 255, 0.1), rgba(179, 136, 255, 0.05));
            border: 1px solid rgba(179, 136, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(179, 136, 255, 0.3);
            border-color: rgba(179, 136, 255, 0.6);
        }

        .menu-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .menu-title {
            font-size: 1.3em;
            color: #b388ff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .menu-description {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid rgba(179, 136, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5em;
            color: #b388ff;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .search-container {
            margin-bottom: 20px;
        }

        .username-input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(179, 136, 255, 0.3);
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 15px;
        }

        .at-symbol {
            color: #b388ff;
            font-size: 1.2em;
            font-weight: 600;
            margin-right: 5px;
            user-select: none;
        }

        .username-input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 1em;
            outline: none;
        }

        .search-btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: none;
            color: #fff;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(179, 136, 255, 0.4);
        }

        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .users-list {
            margin-top: 20px;
        }

        .user-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(179, 136, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .user-item:hover {
            background: rgba(179, 136, 255, 0.1);
            border-color: rgba(179, 136, 255, 0.4);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 1.1em;
            color: #fff;
            margin-bottom: 5px;
        }

        .user-username {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
        }

        .select-btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .select-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(179, 136, 255, 0.4);
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .main-content {
                margin-top: 115px;
            }
            
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Рекомендации</h1>
            <div class="page-subtitle">Управление рекомендациями пользователей</div>
        </div>

        <div class="menu-grid">
            <div class="menu-card" onclick="openModal('remove')">
                <div class="menu-icon">🗑️</div>
                <div class="menu-title">Снять рекомендацию</div>
                <div class="menu-description">Удалить рекомендацию пользователя</div>
            </div>

            <div class="menu-card" onclick="openModal('give')">
                <div class="menu-icon">⭐</div>
                <div class="menu-title">Выдать рекомендацию</div>
                <div class="menu-description">Добавить новую рекомендацию</div>
            </div>

            <div class="menu-card" onclick="openModal('view')">
                <div class="menu-icon">📋</div>
                <div class="menu-title">Рекомендации пользователя</div>
                <div class="menu-description">Просмотр всех рекомендаций</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title"></h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>

            <div class="search-container">
                <div class="username-input-wrapper">
                    <span class="at-symbol">@</span>
                    <input type="text" id="usernameInput" class="username-input" placeholder="введите username">
                </div>
                <button class="search-btn" onclick="searchUsers()">Найти</button>
            </div>

            <div id="usersList" class="users-list"></div>
        </div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        window.location.href = 'chat_admin.html' + window.location.search;
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        let currentModal = null;
        let selectedUser = null;

        function openModal(type) {
            currentModal = type;
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modalTitle');
            const usersList = document.getElementById('usersList');
            const usernameInput = document.getElementById('usernameInput');

            // Очищаем предыдущие данные
            usersList.innerHTML = '';
            usernameInput.value = '';
            selectedUser = null;

            // Устанавливаем заголовок
            if (type === 'remove') {
                modalTitle.textContent = 'Снять рекомендацию';
            } else if (type === 'give') {
                modalTitle.textContent = 'Выдать рекомендацию';
            } else if (type === 'view') {
                modalTitle.textContent = 'Рекомендации пользователя';
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
            currentModal = null;
            selectedUser = null;
        }

        async function searchUsers() {
            const usernameInput = document.getElementById('usernameInput');
            const usersList = document.getElementById('usersList');
            const username = usernameInput.value.trim();

            if (!username) {
                usersList.innerHTML = '<div class="no-results">Введите username для поиска</div>';
                return;
            }

            // Получаем chat_id из URL
            const urlParams = new URLSearchParams(window.location.search);
            const chatId = urlParams.get('chat_id');

            if (!chatId) {
                usersList.innerHTML = '<div class="no-results">Ошибка: не указан chat_id</div>';
                return;
            }

            try {
                usersList.innerHTML = '<div class="no-results">Поиск...</div>';

                const response = await fetch(`https://ezh-dev.ru:3000/chat-users/${chatId}`);
                const data = await response.json();

                if (data.status === 'success' && data.users) {
                    // Фильтруем пользователей по username
                    const filteredUsers = data.users.filter(user => {
                        const userNik = (user.nik || '').toLowerCase();
                        const searchTerm = username.toLowerCase();
                        return userNik.includes(searchTerm);
                    });

                    if (filteredUsers.length === 0) {
                        usersList.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
                        return;
                    }

                    // Отображаем найденных пользователей
                    usersList.innerHTML = filteredUsers.map(user => `
                        <div class="user-item">
                            <div class="user-info">
                                <div class="user-name">${user.nik || 'Без имени'}</div>
                                <div class="user-username">ID: ${user.tg_id}</div>
                            </div>
                            <button class="select-btn" onclick="selectUser(${user.tg_id}, '${(user.nik || '').replace(/'/g, "\\'")}')">Выбрать</button>
                        </div>
                    `).join('');
                } else {
                    usersList.innerHTML = '<div class="no-results">Ошибка загрузки пользователей</div>';
                }
            } catch (error) {
                console.error('Ошибка поиска:', error);
                usersList.innerHTML = '<div class="no-results">Ошибка при поиске пользователей</div>';
            }
        }

        function selectUser(userId, userName) {
            selectedUser = { id: userId, name: userName };
            console.log('Выбран пользователь:', selectedUser);
            
            // Пока ничего не делаем, как указано в требованиях
            // В будущем здесь будет логика обработки выбора
        }

        // Закрытие модального окна при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Поиск по Enter
        document.addEventListener('DOMContentLoaded', () => {
            updateUserProfile();
            
            const usernameInput = document.getElementById('usernameInput');
            if (usernameInput) {
                usernameInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        searchUsers();
                    }
                });
            }
        });
    </script>
</body>
</html>
