<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать ссылку</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .container { max-width: 640px; margin: 0 auto; padding-top: 95px; }
        .header { text-align: center; margin-bottom: 22px; }
        .title { font-size: 2em; color: #b388ff; text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff; margin-bottom: 10px; }
        .subtitle { color: rgba(255, 255, 255, 0.7); }

        .glass-panel {
            position: relative;
            margin-top: 18px;
            padding: 20px 18px 18px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(179, 136, 255, 0.18), rgba(35, 20, 60, 0.9));
            border: 1px solid rgba(179, 136, 255, 0.65);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.06) inset,
                0 12px 28px rgba(0, 0, 0, 0.45),
                0 0 24px rgba(179, 136, 255, 0.35),
                0 0 36px rgba(124, 77, 255, 0.42);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }
        .glass-panel::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 18px;
            pointer-events: none;
            background:
                radial-gradient(900px 260px at 15% 0%, rgba(179, 136, 255, 0.45), transparent 60%),
                radial-gradient(900px 260px at 85% 100%, rgba(124, 77, 255, 0.32), transparent 55%);
            opacity: 0.9;
        }

        .form-group {
            position: relative;
            margin-bottom: 18px;
        }
        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.98em;
            color: #f3e8ff;
            text-shadow: 0 0 8px rgba(203, 167, 255, 0.7);
        }
        .helper {
            font-size: 0.82em;
            color: rgba(243, 232, 255, 0.75);
            margin-bottom: 10px;
        }
        .number-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(203, 167, 255, 0.9);
            background: rgba(19, 10, 40, 0.95);
            color: #f3e8ff;
            font-size: 1em;
            outline: none;
            box-shadow: 0 0 16px rgba(124, 77, 255, 0.65);
        }
        .number-input::placeholder {
            color: rgba(243, 232, 255, 0.45);
        }
        .number-input:focus {
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.15) inset,
                0 0 20px rgba(203, 167, 255, 0.95);
        }
        .number-input.invalid {
            border-color: rgba(255, 99, 132, 0.95);
            box-shadow:
                0 0 0 1px rgba(255, 99, 132, 0.45) inset,
                0 0 18px rgba(255, 99, 132, 0.8);
        }
        .error-text {
            margin-top: 6px;
            font-size: 0.8em;
            color: rgba(255, 144, 164, 0.95);
            min-height: 1.1em;
        }

        .btn-row {
            position: relative;
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 12px;
        }
        .btn {
            appearance: none;
            border: none;
            outline: none;
            cursor: pointer;
            user-select: none;
            padding: 11px 14px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.98em;
            color: #f3e8ff;
            background: linear-gradient(145deg, rgba(124, 77, 255, 0.95), rgba(179, 136, 255, 0.9));
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.08) inset,
                0 0 20px rgba(124, 77, 255, 0.7);
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
            flex: 1 1 auto;
        }
        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            box-shadow: 0 0 12px rgba(124, 77, 255, 0.35);
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.12) inset,
                0 0 26px rgba(203, 167, 255, 0.85);
        }
        .btn.secondary {
            flex: 0 0 auto;
            background: rgba(179, 136, 255, 0.14);
            border: 1px solid rgba(203, 167, 255, 0.9);
            box-shadow: 0 0 18px rgba(179, 136, 255, 0.55);
        }

        .result-wrap {
            position: relative;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid rgba(203, 167, 255, 0.35);
        }
        .status-text {
            font-size: 0.9em;
            color: rgba(243, 232, 255, 0.8);
            margin-bottom: 10px;
            min-height: 1.2em;
        }
        .link-output {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(203, 167, 255, 0.9);
            background: rgba(19, 10, 40, 0.95);
            color: #f3e8ff;
            font-size: 0.95em;
            outline: none;
            box-shadow: 0 0 16px rgba(124, 77, 255, 0.55);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Создать ссылку</h1>
            <div class="subtitle">Базовые параметры ссылки</div>
        </div>

        <div class="glass-panel">
            <div class="form-group">
                <label for="activationsInput" class="label">Количество активаций</label>
                <div class="helper">Целое число от 1 до 50</div>
                <input
                    id="activationsInput"
                    class="number-input"
                    type="tel"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    placeholder="Например, 10"
                    autocomplete="off"
                >
                <div id="activationsError" class="error-text"></div>
            </div>

            <div class="btn-row">
                <button id="createBtn" class="btn" type="button" onclick="createLink()">Создать</button>
                <button id="copyBtn" class="btn secondary" type="button" onclick="copyLink()" disabled>Копировать</button>
            </div>

            <div class="result-wrap">
                <div id="statusText" class="status-text"></div>
                <input id="linkOutput" class="link-output" type="text" value="" placeholder="Ссылка появится здесь" readonly>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        window.location.href = 'links.html' + window.location.search;
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        function validateActivations() {
            const input = document.getElementById('activationsInput');
            const error = document.getElementById('activationsError');
            if (!input || !error) return;

            const raw = input.value.trim();

            if (raw === '') {
                error.textContent = 'Укажите количество активаций от 1 до 50';
                input.classList.remove('invalid');
                return;
            }

            if (!/^[0-9]+$/.test(raw)) {
                error.textContent = 'Только целое число от 1 до 50';
                input.classList.add('invalid');
                return;
            }

            const value = parseInt(raw, 10);
            if (!Number.isInteger(value) || value < 1 || value > 50) {
                error.textContent = 'Допустимо значение от 1 до 50';
                input.classList.add('invalid');
                return;
            }

            input.classList.remove('invalid');
            error.textContent = '';
        }

        function getChatIdFromQuery() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const v = urlParams.get('chat_id');
                if (!v) return null;
                const n = parseInt(v, 10);
                return Number.isFinite(n) ? n : null;
            } catch (_) {
                return null;
            }
        }

        function getAdminFromTelegram() {
            const tg = window.Telegram?.WebApp;
            const user = tg?.initDataUnsafe?.user;
            return {
                admin_id: user?.id ?? null,
                admin_name: user?.first_name ?? null,
                admin_username: user?.username ?? null
            };
        }

        function setUiState({ loading, status, link }) {
            const createBtn = document.getElementById('createBtn');
            const copyBtn = document.getElementById('copyBtn');
            const statusText = document.getElementById('statusText');
            const linkOutput = document.getElementById('linkOutput');

            if (createBtn) createBtn.disabled = !!loading;
            if (statusText) statusText.textContent = status || '';
            if (linkOutput) linkOutput.value = link || '';
            if (copyBtn) copyBtn.disabled = !(link && String(link).trim().length > 0);
        }

        async function createLink() {
            validateActivations();

            const input = document.getElementById('activationsInput');
            const error = document.getElementById('activationsError');
            const raw = (input?.value || '').trim();

            // если есть ошибка — не отправляем
            if (!raw || (error && error.textContent)) {
                setUiState({ loading: false, status: 'Исправьте поле "Количество активаций"' });
                return;
            }

            const activations = parseInt(raw, 10);
            if (!Number.isInteger(activations) || activations < 1 || activations > 50) {
                setUiState({ loading: false, status: 'Количество активаций должно быть от 1 до 50' });
                return;
            }

            const chat_id = getChatIdFromQuery();
            const admin = getAdminFromTelegram();

            setUiState({ loading: true, status: 'Создаю ссылку…', link: '' });

            try {
                const response = await fetch('https://ezh-dev.ru:3000/links-create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        activations,
                        chat_id,
                        ...admin
                    })
                });

                if (!response.ok) {
                    const txt = await response.text().catch(() => '');
                    throw new Error(`HTTP ${response.status} ${txt}`.trim());
                }

                const data = await response.json();
                if (data?.status === 'ok' && data?.link) {
                    setUiState({ loading: false, status: 'Ссылка создана', link: data.link });
                } else {
                    setUiState({ loading: false, status: 'Сервер не вернул ссылку' });
                }
            } catch (e) {
                setUiState({ loading: false, status: 'Ошибка создания: ' + (e?.message || String(e)) });
            }
        }

        async function copyLink() {
            const linkOutput = document.getElementById('linkOutput');
            const link = (linkOutput?.value || '').trim();
            if (!link) return;

            try {
                if (navigator?.clipboard?.writeText) {
                    await navigator.clipboard.writeText(link);
                } else {
                    linkOutput.focus();
                    linkOutput.select();
                    document.execCommand('copy');
                    linkOutput.setSelectionRange(0, 0);
                }
                setUiState({ loading: false, status: 'Скопировано', link });
            } catch (e) {
                setUiState({ loading: false, status: 'Не удалось скопировать: ' + (e?.message || String(e)), link });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('activationsInput');
            if (input) {
                input.addEventListener('input', validateActivations);
            }
        });
    </script>
</body>
</html>
