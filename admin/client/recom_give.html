<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выдать рекомендацию</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding-top: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .title { font-size: 2em; color: #b388ff; text-shadow: 0 0 20px #b388ff; margin-bottom: 10px; }
        .subtitle { color: rgba(255, 255, 255, 0.7); }
        .search-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(179, 136, 255, 0.3); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 15px 20px; border: 2px solid rgba(179, 136, 255, 0.3); border-radius: 25px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); color: #fff; font-size: 16px; outline: none; transition: all 0.3s ease; }
        .search-input::placeholder { color: rgba(255, 255, 255, 0.5); }
        .search-input:focus { border-color: rgba(179, 136, 255, 0.6); background: rgba(255, 255, 255, 0.12); box-shadow: 0 0 20px rgba(179, 136, 255, 0.2); }
        .btn { background: linear-gradient(145deg, #7c4dff, #b388ff); border: none; color: #fff; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-size: 1em; font-weight: 600; width: 100%; transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(179, 136, 255, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .users-list { margin-top: 20px; }
        .user-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(179, 136, 255, 0.2); border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s ease; }
        .user-item:hover { background: rgba(179, 136, 255, 0.1); border-color: rgba(179, 136, 255, 0.4); }
        .user-name { font-size: 1.1em; margin-bottom: 5px; }
        .user-id { font-size: 0.9em; color: rgba(255, 255, 255, 0.6); }
        .no-results { text-align: center; padding: 30px; color: rgba(255, 255, 255, 0.5); }
        .form-box { background: rgba(136, 255, 136, 0.1); border: 1px solid rgba(136, 255, 136, 0.3); border-radius: 10px; padding: 20px; margin-top: 20px; display: none; }
        .form-title { color: #88ff88; font-size: 1.3em; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .label { display: block; margin-bottom: 5px; color: rgba(255, 255, 255, 0.8); }
        textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(179, 136, 255, 0.3); border-radius: 8px; padding: 10px; color: #fff; font-size: 1em; resize: vertical; min-height: 100px; }
        input[type="text"] { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(179, 136, 255, 0.3); border-radius: 8px; padding: 10px; color: #fff; font-size: 1em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">⭐ Выдать рекомендацию</h1>
            <div class="subtitle">Добавление новой рекомендации</div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по нику или username...">
        </div>

        <div id="usersList" class="users-list"></div>

        <div id="formBox" class="form-box">
            <h3 class="form-title">Выдать рекомендацию: <span id="selectedUserName"></span></h3>
            <div class="form-group">
                <label class="label">Должность:</label>
                <input type="text" id="rankInput" placeholder="Введите должность...">
            </div>
            <div class="form-group">
                <label class="label">Причина рекомендации:</label>
                <textarea id="reasonInput" placeholder="Введите причину рекомендации..."></textarea>
            </div>
            <button class="btn" onclick="giveRecommendation()">Выдать рекомендацию</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.BackButton) {
                tg.BackButton.show();
                tg.BackButton.onClick(() => window.location.href = 'recommendations.html' + window.location.search);
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat_id');
        let selectedUser = null;
        let allUsers = [];

        async function loadAllUsers() {
            try {
                const response = await fetch(`https://ezh-dev.ru:3000/users/${chatId}`);
                const data = await response.json();
                if (data && typeof data === 'object') {
                    allUsers = Object.keys(data).map(key => data[key]).filter(u => u && u.nik);
                }
            } catch (error) {
                console.error('Ошибка загрузки пользователей:', error);
            }
        }

        async function searchUsers() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const usersList = document.getElementById('usersList');
            document.getElementById('formBox').style.display = 'none';

            if (!searchTerm) {
                usersList.innerHTML = '<div class="no-results">Введите ник или username для поиска</div>';
                return;
            }

            const filtered = allUsers.filter(u => {
                const searchLower = searchTerm.toLowerCase();
                return (u.nik && u.nik.toLowerCase().includes(searchLower)) || 
                       (u.username && u.username.toLowerCase().includes(searchLower));
            });

            if (filtered.length === 0) {
                usersList.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
                return;
            }

            usersList.innerHTML = filtered.map(u => `
                <div class="user-item" onclick='selectUser(${JSON.stringify({id: u.tg_ids, name: u.nik || "Без имени"})})'>
                    <div class="user-name">${u.nik || 'Без имени'}</div>
                    <div class="user-id">ID: ${u.tg_ids}</div>
                </div>
            `).join('');
        }

        function selectUser(user) {
            selectedUser = user;
            document.getElementById('selectedUserName').textContent = user.name;
            document.getElementById('formBox').style.display = 'block';
            document.getElementById('reasonInput').value = '';
            document.getElementById('rankInput').value = '';
        }

        async function giveRecommendation() {
            const rank = document.getElementById('rankInput').value.trim();
            const reason = document.getElementById('reasonInput').value.trim();
            
            if (!rank) {
                alert('Введите должность');
                return;
            }
            
            if (!reason) {
                alert('Введите причину рекомендации');
                return;
            }

            if (!selectedUser) {
                alert('Выберите пользователя');
                return;
            }

            try {
                const user = tg?.initDataUnsafe?.user;
                const response = await fetch('https://ezh-dev.ru:3000/recom-give', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: selectedUser.id,
                        chat_id: chatId,
                        rank: rank,
                        reason: reason,
                        admin_id: user?.id,
                        admin_name: user?.first_name,
                        admin_username: user?.username
                    })
                });

                const result = await response.json();
                if (result.status === 'ok') {
                    alert('Рекомендация выдана');
                    document.getElementById('formBox').style.display = 'none';
                    document.getElementById('usersList').innerHTML = '';
                    document.getElementById('searchInput').value = '';
                } else {
                    alert('Ошибка выдачи рекомендации');
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        document.getElementById('searchInput').addEventListener('input', searchUsers);
        loadAllUsers();
    </script>
</body>
</html>
