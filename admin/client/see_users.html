<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр пользователей</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 95px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-content {
            padding: 20px;
            margin-top: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 135px);
            justify-content: flex-start;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 2em;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Стили поиска */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(179, 136, 255, 0.3);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-input:focus {
            border-color: rgba(179, 136, 255, 0.6);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.2);
        }

        /* Стили списка пользователей */
        .users-container {
            width: 100%;
            max-width: 800px;
        }

        .users-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .user-card {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.9), rgba(25, 25, 55, 0.8));
            border: 1px solid rgba(179, 136, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(179, 136, 255, 0.15), 
                transparent);
            transition: left 0.5s ease;
        }

        .user-card:hover::before {
            left: 100%;
        }

        .user-card:hover {
            background: linear-gradient(135deg, rgba(20, 20, 45, 0.95), rgba(35, 35, 75, 0.9));
            border-color: rgba(179, 136, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(179, 136, 255, 0.2);
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 1.1em;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .user-username {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
        }

        .user-status {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-admin {
            background: linear-gradient(135deg, #ff4757, #ff6b7a);
            color: white;
        }

        .status-moderator {
            background: linear-gradient(135deg, #ffa502, #ff7675);
            color: white;
        }

        .status-member {
            background: linear-gradient(135deg, #26de81, #20bf6b);
            color: white;
        }

        .status-guest {
            background: linear-gradient(135deg, #747d8c, #57606f);
            color: white;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .user-message {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border-left: 3px solid #b388ff;
        }

        .message-preview {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .message-date {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
        }

        .user-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.6);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #b388ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-content {
                margin-top: 115px;
            }
            
            .search-container {
                margin-bottom: 20px;
            }
            
            .search-input {
                padding: 12px 16px;
                font-size: 14px;
            }
            
            .user-card {
                padding: 15px;
            }
            
            .user-avatar {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }
            
            .user-name {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div class="main-content">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Загрузка пользователей...</div>
        </div>

        <div id="usersContent" style="display: none;">
            <div class="page-header">
                <h1 class="page-title">Пользователи чата</h1>
                <div class="page-subtitle" id="pageSubtitle">Загрузка...</div>
            </div>

            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="🔍 Поиск по нику или username..."
                >
            </div>

            <div class="users-container">
                <div class="users-grid" id="usersGrid">
                    <!-- Пользователи будут добавлены динамически -->
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        window.location.href = 'chat_admin.html' + window.location.search;
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;
        let currentChatId = null;
        let allUsers = [];

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        function getChatIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('chat_id');
        }

        // API functionality
        const API_BASE = 'https://ezh-dev.ru:3000';

        async function fetchChatUsers(chatId) {
            try {
                console.log(`Запрос к API: ${API_BASE}/chat-users/${chatId}`);
                
                // Добавляем таймаут 10 секунд
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(`${API_BASE}/chat-users/${chatId}`, {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                console.log(`Статус ответа: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Данные от API:', data);
                
                if (data.status === 'success') {
                    return data.users || [];
                } else {
                    throw new Error(data.message || 'Ошибка API');
                }
            } catch (error) {
                console.error('Ошибка в fetchChatUsers:', error);
                
                if (error.name === 'AbortError') {
                    throw new Error('Превышено время ожидания ответа сервера');
                } else if (error instanceof TypeError && error.message.includes('fetch')) {
                    throw new Error('Не удалось подключиться к серверу. Проверьте соединение.');
                } else {
                    throw error;
                }
            }
        }

        function getStatusText(status) {
            const statusMap = {
                'admin': 'Админ',
                'moderator': 'Модератор',
                'member': 'Участник',
                'guest': 'Гость'
            };
            return statusMap[status] || 'Неизвестно';
        }

        function formatDate(dateString) {
            if (!dateString) return 'Нет данных';
            
            try {
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) {
                    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                    if (diffHours === 0) {
                        const diffMinutes = Math.floor(diffMs / (1000 * 60));
                        return diffMinutes <= 1 ? 'Только что' : `${diffMinutes} мин назад`;
                    }
                    return `${diffHours} ч назад`;
                } else if (diffDays === 1) {
                    return 'Вчера';
                } else if (diffDays < 7) {
                    return `${diffDays} дней назад`;
                } else {
                    return date.toLocaleDateString('ru-RU');
                }
            } catch (e) {
                return dateString;
            }
        }

        function createUserCard(user) {
            const card = document.createElement('div');
            card.className = 'user-card';
            
            const initials = (user.nik || '').slice(0, 2).toUpperCase() || user.tg_id.toString().slice(0, 2);
            
            card.innerHTML = `
                <div class="user-header">
                    <div class="user-avatar">${initials}</div>
                    <div class="user-info">
                        <div class="user-name">${user.nik}</div>
                        <div class="user-username">${user.username ? '@' + user.username : ''}</div>
                    </div>
                    <div class="user-status status-${user.status}">${getStatusText(user.status)}</div>
                </div>
                <div class="user-details">
                    <div class="user-message">
                        <div class="message-preview">${user.last_message}</div>
                        <div class="message-date">${formatDate(user.last_message_date)}</div>
                    </div>
                    <div class="user-meta">
                        <div class="meta-item">
                            <span>📅</span>
                            <span>В чате: ${formatDate(user.join_date)}</span>
                        </div>
                        <div class="meta-item">
                            <span>⏰</span>
                            <span>Активность: ${formatDate(user.last_active)}</span>
                        </div>
                        <div class="meta-item">
                            <span>⭐</span>
                            <span>Ранг: ${user.rang}</span>
                        </div>
                    </div>
                </div>
            `;
            
            return card;
        }

        function renderUsers(users) {
            const grid = document.getElementById('usersGrid');
            grid.innerHTML = '';
            
            if (users.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">Пользователи не найдены</div>
                        <div class="empty-state-subtext">Попробуйте изменить параметры поиска</div>
                    </div>
                `;
                return;
            }
            
            users.forEach(user => {
                const card = createUserCard(user);
                grid.appendChild(card);
            });
        }

        function filterUsers(searchTerm) {
            if (!searchTerm) {
                renderUsers(allUsers);
                return;
            }
            
            const filtered = allUsers.filter(user => {
                const searchLower = searchTerm.toLowerCase();
                return (
                    (user.nik && user.nik.toLowerCase().includes(searchLower)) ||
                    (user.username && user.username.toLowerCase().includes(searchLower)) ||
                    (user.name && user.name.toLowerCase().includes(searchLower))
                );
            });
            
            renderUsers(filtered);
        }

        function showError(message) {
            const grid = document.getElementById('usersGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">❌</div>
                    <div class="empty-state-text">Ошибка</div>
                    <div class="empty-state-subtext">${message}</div>
                </div>
            `;
        }

        async function loadUsers() {
            const user = getCurrentUser();
            if (!user) {
                console.error('Пользователь не определен');
                showError('Пользователь не определен');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersContent').style.display = 'block';
                return;
            }
            
            currentChatId = getChatIdFromUrl();
            if (!currentChatId) {
                console.error('ID чата не указан');
                showError('ID чата не указан');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersContent').style.display = 'block';
                return;
            }
            
            console.log('Загрузка пользователей для чата:', currentChatId);
            
            try {
                const users = await fetchChatUsers(currentChatId);
                console.log('Получено пользователей:', users.length);
                
                if (users.length === 0) {
                    console.warn('Список пользователей пуст');
                    showError('Не удалось загрузить пользователей или список пуст');
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('usersContent').style.display = 'block';
                    return;
                }
                
                allUsers = users;
                
                // Обновляем заголовок
                document.getElementById('pageSubtitle').textContent = `${users.length} пользователей`;
                
                // Отображаем пользователей
                renderUsers(users);
                
                // Скрываем загрузку и показываем контент
                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersContent').style.display = 'block';
                
            } catch (error) {
                console.error('Ошибка при загрузке пользователей:', error);
                showError('Произошла ошибка при загрузке пользователей');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersContent').style.display = 'block';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateUserProfile();
            loadUsers();
            
            // Добавляем обработчик поиска
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    filterUsers(e.target.value);
                });
            }
        });
    </script>
</body>
</html>
