<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 50px;
            font-size: 2.5em;
        }
        .container {
            max-width: 1000px;            
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        .section-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #7c4dff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3);
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            width: 100%;
            height: 75px;
        }
        .section-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(124, 77, 255, 0.6);
            border-color: #b388ff;
        }
        .section-card.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .section-title {
            font-size: 1.8em;
            color: #b388ff;
            text-shadow: 0 0 10px #b388ff;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
            }

            .user-avatar {
                width: 30px;
                height: 30px;
            }

            .user-name {
                font-size: 0.8em;
                max-width: 100px;
            }
        }

        .tg-required {
            display: none;
            max-width: 1000px;
            margin: 0 auto 20px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 82, 82, 0.4);
            background: rgba(255, 82, 82, 0.12);
            color: #ffb3b3;
            text-align: center;
            box-shadow: 0 0 18px rgba(255, 82, 82, 0.12);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.92);
            border: 1px solid rgba(124, 77, 255, 0.55);
            box-shadow: 0 0 22px rgba(124, 77, 255, 0.22);
            color: #fff;
            padding: 12px 14px;
            border-radius: 14px;
            z-index: 2000;
            max-width: min(560px, calc(100vw - 24px));
            display: none;
            backdrop-filter: blur(10px);
        }

        .toast.error {
            border-color: rgba(255, 82, 82, 0.6);
            box-shadow: 0 0 22px rgba(255, 82, 82, 0.18);
        }

        .toast-title {
            font-weight: 800;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .toast-text {
            opacity: 0.95;
            font-size: 0.9em;
            line-height: 1.35;
            word-break: break-word;
        }

    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div id="tgRequired" class="tg-required">
        Открой админ-панель через Telegram Mini App (иначе профиль не определяется).
    </div>

    <div id="toast" class="toast error" role="status" aria-live="polite">
        <div class="toast-title">Ошибка</div>
        <div id="toastText" class="toast-text"></div>
    </div>

    <h1>Главная страница</h1>
    <div class="container">
        <a href="users.html" class="section-card">
            <div class="section-title">Пользователи</div>
        </a>
        <a href="dks.html" class="section-card">
            <div class="section-title">Уровень команд</div>
        </a>
        <a href="recommendations.html" class="section-card">
            <div class="section-title">Рекомендации</div>
        </a>
        <a href="links.html" class="section-card">
            <div class="section-title">Создание ссылок</div>
        </a>
        <a href="all-links.html" class="section-card">
            <div class="section-title">Все ссылки</div>
        </a>
    </div>
    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) tg.BackButton.hide();
                if (tg.MainButton) tg.MainButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) {
                const hasTg = !!window.Telegram?.WebApp;
                const banner = document.getElementById('tgRequired');
                if (banner) banner.style.display = 'block';
                console.warn('Telegram WebApp user not available. hasTg=', hasTg, 'initDataUnsafe=', window.Telegram?.WebApp?.initDataUnsafe);
                showError('Не удалось определить профиль Telegram. Открой админ-панель внутри Telegram Mini App.');
                return;
            }

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        let toastTimer = null;
        function showError(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.textContent = mapErrorToRu(message);
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        function mapErrorToRu(raw) {
            const msg = (raw || '').toString();
            const m = msg.toLowerCase();
            if (!m) return 'Произошла ошибка. Попробуйте ещё раз.';
            if (m.includes('access denied') || m.includes('403')) return 'Доступ запрещён. У вас нет прав.';
            if (m.includes('cannot') && m.includes('yourself')) return 'Нельзя выполнять это действие над собой.';
            if (m.includes('400')) return 'Некорректный запрос. Проверьте данные.';
            if (m.includes('500')) return 'Ошибка сервера. Попробуйте позже.';
            return msg;
        }

        updateUserProfile();
    </script>
</body>
</html>
