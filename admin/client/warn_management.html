<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление предупреждениями</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 95px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-content {
            padding: 20px;
            margin-top: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 135px);
            justify-content: flex-start;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2em;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }

        .warns-container {
            width: 100%;
            max-width: 900px;
        }

        .warn-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(179, 136, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .warn-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(179, 136, 255, 0.5);
            transform: translateY(-2px);
        }

        .warn-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .warn-user {
            font-size: 1.1em;
            font-weight: 600;
            color: #b388ff;
        }

        .warn-date {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.5);
        }

        .warn-reason {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .warn-moder {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
        }

        .warn-remove-btn {
            margin-top: 10px;
            padding: 0 16px;
            height: 0;
            border-radius: 8px;
            border: 1px solid #b388ff;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
            box-shadow: 0 0 0 rgba(124, 77, 255, 0.0);
            opacity: 0;
            overflow: hidden;
            transform: scale(0.9);
            transition: height 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, padding-top 0.2s ease, padding-bottom 0.2s ease;
        }

        .warn-remove-btn.visible {
            height: 32px;
            padding-top: 8px;
            padding-bottom: 8px;
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.5);
        }

        .warn-remove-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 16px rgba(124, 77, 255, 0.8);
        }

        .warn-removed-icon {
            margin-top: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #b388ff;
            color: #050510;
            background: radial-gradient(circle at top left, rgba(179, 136, 255, 0.9), rgba(124, 77, 255, 0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            box-shadow: 0 0 0 rgba(124, 77, 255, 0.0);
            opacity: 0;
            transform: scale(0.4) rotate(-20deg);
            animation: warnCheckAppear 0.4s ease-out forwards;
        }

        @keyframes warnCheckAppear {
            0% {
                opacity: 0;
                transform: scale(0.4) rotate(-20deg) translateY(10px);
                box-shadow: 0 0 0 rgba(124, 77, 255, 0.0);
            }
            60% {
                opacity: 1;
                transform: scale(1.1) rotate(5deg) translateY(0);
                box-shadow: 0 0 14px rgba(124, 77, 255, 0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg) translateY(0);
                box-shadow: 0 0 8px rgba(124, 77, 255, 0.7);
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .main-content {
                margin-top: 115px;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Предупреждения чата</h1>
            <div class="page-subtitle" id="warnsCount">Загрузка...</div>
        </div>

        <div id="loadingState" class="loading">
            <div>⏳ Загрузка предупреждений...</div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">✅</div>
            <div class="empty-state-text">Нет предупреждений</div>
            <div class="empty-state-subtext">В этом чате пока нет активных предупреждений</div>
        </div>

        <div id="warnsContainer" class="warns-container" style="display: none;"></div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        const params = new URLSearchParams(window.location.search);
                        window.location.href = 'chat_admin.html?' + params.toString();
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                chatId: params.get('chat_id')
            };
        }

        async function loadWarns() {
            const { chatId } = getUrlParams();
            
            if (!chatId) {
                document.getElementById('loadingState').innerHTML = '<div>❌ Не указан ID чата</div>';
                return;
            }

            try {
                const response = await fetch(`https://ezh-dev.ru:3000/chat_warns/${chatId}`);
                const data = await response.json();

                const loadingState = document.getElementById('loadingState');
                const emptyState = document.getElementById('emptyState');
                const warnsContainer = document.getElementById('warnsContainer');
                const warnsCount = document.getElementById('warnsCount');

                loadingState.style.display = 'none';

                if (data.status === 'success' && data.warns && data.warns.length > 0) {
                    warnsCount.textContent = `Всего предупреждений: ${data.count}`;
                    warnsContainer.style.display = 'block';
                    
                    let openedWarnButton = null;
                    warnsContainer.innerHTML = '';
                    
                    data.warns.forEach(warn => {
                        const card = document.createElement('div');
                        card.className = 'warn-card';
                        card.innerHTML = `
                            <div class="warn-header">
                                <div class="warn-user">${escapeHtml(warn.user_name)}</div>
                                <div class="warn-date">${escapeHtml(warn.date || 'Неизвестна')}</div>
                            </div>
                            <div class="warn-reason">📝 ${escapeHtml(warn.reason)}</div>
                            <div class="warn-moder">👮 Модератор: ${escapeHtml(warn.moder_name)}</div>
                            <button class="warn-remove-btn" data-user-id="${warn.user_id}">Снять</button>
                        `;
                        
                        card.addEventListener('click', (e) => {
                            const btn = card.querySelector('.warn-remove-btn');
                            if (!btn || e.target === btn) return;
                            
                            if (openedWarnButton && openedWarnButton !== btn) {
                                openedWarnButton.classList.remove('visible');
                            }
                            
                            const isVisible = btn.classList.contains('visible');
                            if (isVisible) {
                                btn.classList.remove('visible');
                                openedWarnButton = null;
                            } else {
                                btn.classList.add('visible');
                                openedWarnButton = btn;
                            }
                        });
                        
                        card.querySelector('.warn-remove-btn').addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const btn = e.currentTarget;
                            const userId = btn.getAttribute('data-user-id');
                            const admin = getCurrentUser();
                            
                            if (!admin) {
                                alert('Не удалось получить данные профиля Telegram');
                                return;
                            }
                            
                            try {
                                const response = await fetch('https://ezh-dev.ru:3000/snat_warn', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        chat: chatId,
                                        userid: userId,
                                        num: 1,
                                        admin_id: admin.id,
                                        admin_name: `${admin.first_name} ${admin.last_name}`.trim() || admin.username,
                                        admin_username: admin.username
                                    })
                                });
                                
                                const result = await response.json();
                                console.log('Response:', result);
                                
                                btn.classList.remove('visible');
                                btn.disabled = true;
                                openedWarnButton = null;
                                
                                const icon = document.createElement('div');
                                icon.className = 'warn-removed-icon';
                                icon.textContent = '✓';
                                card.appendChild(icon);
                                
                                setTimeout(() => {
                                    card.remove();
                                    if (!warnsContainer.querySelector('.warn-card')) {
                                        warnsContainer.style.display = 'none';
                                        emptyState.style.display = 'block';
                                        warnsCount.textContent = 'Нет предупреждений';
                                    }
                                }, 450);
                            } catch (error) {
                                console.error('Ошибка:', error);
                                alert('Ошибка при снятии предупреждения');
                            }
                        });
                        
                        warnsContainer.appendChild(card);
                    });
                } else {
                    warnsCount.textContent = 'Нет предупреждений';
                    emptyState.style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loadingState').innerHTML = '<div>❌ Ошибка загрузки данных</div>';
                console.error('Error loading warns:', error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateUserProfile();
            loadWarns();
        });
    </script>
</body>
</html>
