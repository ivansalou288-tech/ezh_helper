<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ссылки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 95px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-content {
            padding: 20px;
            margin-top: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 135px);
            justify-content: flex-start;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2em;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
        }

        .links-grid {
            width: 100%;
            max-width: 520px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .neon-card {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 14px;
            border-radius: 18px;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
            background: linear-gradient(135deg, rgba(179, 136, 255, 0.18), rgba(35, 20, 60, 0.85));
            border: 1px solid rgba(179, 136, 255, 0.65);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.06) inset,
                0 12px 28px rgba(0, 0, 0, 0.45),
                0 0 24px rgba(179, 136, 255, 0.35),
                0 0 36px rgba(124, 77, 255, 0.42);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .neon-card::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 18px;
            pointer-events: none;
            background:
                radial-gradient(900px 220px at 15% 0%, rgba(179, 136, 255, 0.45), transparent 60%),
                radial-gradient(800px 240px at 80% 100%, rgba(124, 77, 255, 0.32), transparent 55%);
            opacity: 0.9;
            filter: saturate(1.25);
        }

        .neon-card:hover {
            transform: translateY(-2px);
            border-color: rgba(203, 167, 255, 0.95);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.12) inset,
                0 16px 34px rgba(0, 0, 0, 0.6),
                0 0 34px rgba(203, 167, 255, 0.62),
                0 0 46px rgba(124, 77, 255, 0.8);
        }

        .neon-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            z-index: 1;
        }

        .neon-title {
            font-size: 1.08em;
            font-weight: 800;
            color: #f3e8ff;
            text-shadow: 0 0 12px rgba(203, 167, 255, 0.85), 0 0 22px rgba(124, 77, 255, 0.8);
        }

        .neon-subtitle {
            display: none;
        }

        .neon-right {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1;
        }

        .neon-icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: rgba(179, 136, 255, 0.12);
            border: 1px solid rgba(203, 167, 255, 0.9);
            box-shadow: 0 0 18px rgba(179, 136, 255, 0.65);
            color: #f3e8ff;
            text-shadow: 0 0 14px rgba(203, 167, 255, 0.95);
            font-size: 1.2em;
        }

        .neon-arrow {
            font-size: 1.05em;
            color: rgba(243, 232, 255, 0.75);
            text-shadow: 0 0 10px rgba(203, 167, 255, 0.85);
        }

        @media (max-width: 768px) {
            .main-content {
                margin-top: 115px;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Ссылки</h1>
            <div class="page-subtitle">Управление ссылками</div>
        </div>

        <div class="links-grid">
            <a class="neon-card" href="links_create.html" onclick="return goWithQuery(event, 'links_create.html')">
                <div class="neon-left">
                    <div class="neon-title">Создать ссылку</div>
                    <div class="neon-subtitle">Окно создания новой ссылки (пустое)</div>
                </div>
                <div class="neon-right">
                    <div class="neon-icon">＋</div>
                    <div class="neon-arrow">›</div>
                </div>
            </a>

            <a class="neon-card" href="links_all.html" onclick="return goWithQuery(event, 'links_all.html')">
                <div class="neon-left">
                    <div class="neon-title">Все ссылки</div>
                    <div class="neon-subtitle">Список всех ссылок (пустое)</div>
                </div>
                <div class="neon-right">
                    <div class="neon-icon">≡</div>
                    <div class="neon-arrow">›</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        window.location.href = 'chat_admin.html' + window.location.search;
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateUserProfile();
        });

        function goWithQuery(event, target) {
            try {
                event?.preventDefault?.();
                window.location.href = target + window.location.search;
                return false;
            } catch (_) {
                return true;
            }
        }
    </script>
</body>
</html>
