<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка пользователя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .user-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #7c4dff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3), inset 0 0 20px rgba(124, 77, 255, 0.1);
        }
        .user-name {
            font-size: 2em;
            color: #b388ff;
            text-shadow: 0 0 10px #b388ff;
            margin-bottom: 20px;
            text-align: center;
        }
        .user-info {
            color: #e0e0e0;
            line-height: 2;
            font-size: 1.1em;
        }
        .label {
            color: #7c4dff;
            font-weight: bold;
        }
        .user-status {
            margin-top: 10px;
            font-size: 1.05em;
            color: #9ccc65;
            text-align: center;
            text-shadow: 0 0 10px rgba(156, 204, 101, 0.7);
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 95px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
            height: 51px;
            max-width: calc(100vw - 40px);
            overflow: hidden;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            flex: 0 0 35px;
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
            flex: 0 0 35px;
        }

        .user-name-profile {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 115px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
                height: 44px;
                max-width: calc(100vw - 20px);
            }

            .user-avatar {
                width: 30px;
                height: 30px;
                flex: 0 0 30px;
            }

            .user-avatar-fallback {
                width: 30px;
                height: 30px;
                flex: 0 0 30px;
                font-size: 0.8em;
            }

            .user-name-profile {
                font-size: 0.8em;
                max-width: 100px;
            }
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #b388ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 60px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name-profile"></div>
    </div>

    <a href="#" class="back-btn" id="backBtn">← Назад</a>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Загрузка данных пользователя...</div>
    </div>

    <div id="content" style="display: none;">
        <h1>Карточка пользователя</h1>
        <div class="container">
            <div class="user-card" id="userCard"></div>
        </div>
    </div>

    <div class="error" id="error" style="display: none;">
        <div>❌</div>
        <div>Не удалось загрузить данные пользователя</div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        const backBtn = document.querySelector('.back-btn');
                        if (backBtn) backBtn.click();
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;
        let currentChatId = null;
        let currentUserId = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        function getChatIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('chat_id');
        }

        function getUserIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('user_id');
        }

        function formatDate(dateString) {
            if (!dateString) return 'Нет данных';
            
            try {
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) {
                    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                    if (diffHours === 0) {
                        const diffMinutes = Math.floor(diffMs / (1000 * 60));
                        return diffMinutes <= 1 ? 'Только что' : `${diffMinutes} мин назад`;
                    }
                    return `${diffHours} ч назад`;
                } else if (diffDays === 1) {
                    return 'Вчера';
                } else if (diffDays < 7) {
                    return `${diffDays} дней назад`;
                } else {
                    return date.toLocaleDateString('ru-RU');
                }
            } catch (e) {
                return dateString;
            }
        }

        function formatTimeAgo(dateString) {
            if (!dateString) return 'Неизвестно';
            
            try {
                // Парсим дату в формате "ч:мин:сек д.м.гггг"
                const timePart = dateString.split(' ')[0]; // "ч:мин:сек"
                const datePart = dateString.split(' ')[1];  // "д.м.гггг"
                
                if (!timePart || !datePart) return dateString;
                
                const [hours, minutes, seconds] = timePart.split(':').map(Number);
                const [day, month, year] = datePart.split('.').map(Number);
                
                const lastMessageDate = new Date(year, month - 1, day, hours, minutes, seconds);
                const now = new Date();
                
                const diffMs = now - lastMessageDate;
                if (diffMs < 0) return 'Только что';
                
                const diffSeconds = Math.floor(diffMs / 1000);
                const diffMinutes = Math.floor(diffSeconds / 60);
                const diffHours = Math.floor(diffMinutes / 60);
                const diffDays = Math.floor(diffHours / 24);
                
                if (diffDays > 0) {
                    const remainingHours = diffHours % 24;
                    const remainingMinutes = diffMinutes % 60;
                    return `${diffDays}д ${remainingHours}ч ${remainingMinutes}м назад`;
                } else if (diffHours > 0) {
                    const remainingMinutes = diffMinutes % 60;
                    return `${diffHours}ч ${remainingMinutes}м назад`;
                } else if (diffMinutes > 0) {
                    return `${diffMinutes}м назад`;
                } else {
                    return 'Только что';
                }
            } catch (e) {
                return dateString;
            }
        }

        async function loadUser() {
            currentChatId = getChatIdFromUrl();
            currentUserId = getUserIdFromUrl();
            
            if (!currentChatId || !currentUserId) {
                showError('Отсутствуют необходимые параметры');
                return;
            }

            try {
                const response = await fetch(`https://ezh-dev.ru:3000/user/${currentChatId}/${currentUserId}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const user = await response.json();
                console.log('Получены данные пользователя:', user);
                
                // Формируем отображаемое имя
                const displayName = user.nik || user.name || `@${user.username}` || 'Без имени';
                
                let userCardHTML = `
                    <div class="user-name">${displayName}</div>
                    ${user.status ? `<div class="user-status">${user.status}</div>` : ''}
                    <div class="user-info">
                        <span class="label">ID:</span> ${user.tg_ids}<br>
                        <span class="label">Username:</span> @${user.username || 'нет'}<br>
                        <span class="label">Имя:</span> ${user.name || 'нет'}<br>
                        <span class="label">Возраст:</span> ${user.age || 'нет данных'}<br>
                        <span class="label">Ник PUBG:</span> ${user.nik_pubg || 'нет'} (ID: ${user.id_pubg || 'нет'})<br>
                        <span class="label">Ник в чате:</span> ${user.nik || 'нет'}<br>
                        <span class="label">Ранг:</span> ${user.rang || 'нет'}<br>
                        <span class="label">Последнее сообщение:</span> ${formatTimeAgo(user.last_date)}<br>
                        <span class="label">Дата входа:</span> ${user.date_vhod || 'нет данных'}<br>
                        <span class="label">Количество сообщений:</span> ${user.mess_count || 0}
                    </div>
                `;
                
                document.getElementById('userCard').innerHTML = userCardHTML;
                
                // Показываем контент
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                console.error('Ошибка при загрузке пользователя:', error);
                showError('Не удалось загрузить данные пользователя');
            }
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            if (message) {
                document.getElementById('error').innerHTML = `
                    <div>❌</div>
                    <div>${message}</div>
                `;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateUserProfile();
            
            // Устанавливаем ссылку для кнопки "назад"
            const backBtn = document.getElementById('backBtn');
            const chatId = getChatIdFromUrl();
            if (backBtn && chatId) {
                backBtn.href = `see_users.html?chat_id=${chatId}`;
            }
            
            loadUser();
        });
    </script>
</body>
</html>
