<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Административные функции</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 95px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-content {
            padding: 20px;
            margin-top: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 135px);
            justify-content: flex-start;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2em;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }

        /* Поиск пользователей */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #fff;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #b388ff;
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.3);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.2em;
        }

        /* Результаты поиска */
        .results-container {
            width: 100%;
            max-width: 600px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(179, 136, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(179, 136, 255, 0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .user-card-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1.2em;
            border: 2px solid rgba(179, 136, 255, 0.5);
        }

        .user-details {
            flex: 1;
        }

        .user-username {
            font-size: 1.1em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
        }

        .user-fullname {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Тумблер */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 26px;
            transition: all 0.3s ease;
        }

        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .toggle-switch input:checked + .toggle-slider {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border-color: #b388ff;
            box-shadow: 0 0 15px rgba(179, 136, 255, 0.5);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        .loading {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            padding: 20px;
        }

        .no-results {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px 20px;
            font-size: 1em;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-top: 115px;
            }
            
            .search-container,
            .results-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Управление правами</h1>
            <div class="page-subtitle">Поиск пользователей и выдача прав на чат</div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Введите username...">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div id="resultsContainer" class="results-container"></div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        window.location.href = 'chat_admin.html' + window.location.search;
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        let allUsers = [];
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        searchInput.addEventListener('input', (e) => {
            filterUsers(e.target.value);
        });

        function filterUsers(searchTerm) {
            if (!searchTerm) {
                displayResults(allUsers);
                return;
            }
            
            const filtered = allUsers.filter(user => {
                const searchLower = searchTerm.toLowerCase();
                return (
                    (user.username && user.username.toLowerCase().includes(searchLower)) ||
                    (user.first_name && user.first_name.toLowerCase().includes(searchLower)) ||
                    (user.last_name && user.last_name.toLowerCase().includes(searchLower))
                );
            });
            
            displayResults(filtered);
        }

        async function loadUsers() {
            resultsContainer.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const chatId = urlParams.get('chat_id');
                
                if (!chatId) {
                    resultsContainer.innerHTML = '<div class="no-results">Ошибка: не указан chat_id</div>';
                    return;
                }
                
                const response = await fetch(`/api/search_users?chat_id=${encodeURIComponent(chatId)}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.users && data.users.length > 0) {
                    allUsers = data.users;
                    displayResults(allUsers);
                } else {
                    allUsers = [];
                    resultsContainer.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
                }
            } catch (error) {
                console.error('Load error:', error);
                resultsContainer.innerHTML = `<div class="no-results">Ошибка загрузки: ${error.message}</div>`;
            }
        }

        function displayResults(users) {
            if (users.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
                return;
            }
            
            resultsContainer.innerHTML = users.map(user => {
                const firstName = user.first_name || '';
                const lastName = user.last_name || '';
                const username = user.username || '';
                
                const initials = ((firstName.slice(0, 1) + lastName.slice(0, 1)) || username.slice(0, 2) || '?').toUpperCase();
                const fullName = `${firstName} ${lastName}`.trim() || 'Без имени';
                
                return `
                    <div class="user-card">
                        <div class="user-info">
                            <div class="user-card-avatar">${initials}</div>
                            <div class="user-details">
                                <div class="user-username">@${username || 'unknown'}</div>
                                <div class="user-fullname">${fullName}</div>
                            </div>
                        </div>
                        <div class="toggle-container">
                            <span class="toggle-label">Права</span>
                            <label class="toggle-switch">
                                <input type="checkbox" ${user.has_access ? 'checked' : ''} onchange="toggleAccess(${user.user_id}, this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleAccess(userId, hasAccess) {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const chatId = urlParams.get('chat_id');
                
                const response = await fetch('/api/toggle_access', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, chat_id: chatId, has_access: hasAccess })
                });
                
                const data = await response.json();
                if (data.success) {
                    const tg = window.Telegram?.WebApp;
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    const tg = window.Telegram?.WebApp;
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                }
            } catch (error) {
                const tg = window.Telegram?.WebApp;
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateUserProfile();
            loadUsers();
        });
    </script>
</body>
</html>
