<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 95px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 95px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
            }

            .user-avatar {
                width: 30px;
                height: 30px;
            }

            .user-name {
                font-size: 0.8em;
                max-width: 100px;
            }
        }

        .tg-required {
            display: none;
            max-width: 1000px;
            margin: 0 auto 20px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 82, 82, 0.4);
            background: rgba(255, 82, 82, 0.12);
            color: #ffb3b3;
            text-align: center;
            box-shadow: 0 0 18px rgba(255, 82, 82, 0.12);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.92);
            border: 1px solid rgba(124, 77, 255, 0.55);
            box-shadow: 0 0 22px rgba(124, 77, 255, 0.22);
            color: #fff;
            padding: 12px 14px;
            border-radius: 14px;
            z-index: 2000;
            max-width: min(560px, calc(100vw - 24px));
            display: none;
            backdrop-filter: blur(10px);
        }

        .toast.error {
            border-color: rgba(255, 82, 82, 0.6);
            box-shadow: 0 0 22px rgba(255, 82, 82, 0.18);
        }

        .toast-title {
            font-weight: 800;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .toast-text {
            opacity: 0.95;
            font-size: 0.9em;
            line-height: 1.35;
            word-break: break-word;
        }

        .main-content {
            padding: 20px;
            margin-top: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 135px);
            justify-content: flex-start;
        }

        .page-title {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 30px;
            font-size: 2.5em;
            order: -1;
        }

        /* Стили для контейнера чатов */
        .admin-chats-container {
            max-width: 800px;
            margin: auto auto 0;
            padding: 10px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 15px;
        }

        .chats-title {
            font-size: 1.5em;
            color: #b388ff;
            font-weight: 600;
        }

        .chats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
            padding: 0;
        }

        .chat-card {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.9), rgba(25, 25, 55, 0.8));
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 4px 20px rgba(0, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .chat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.15), 
                transparent);
            transition: left 0.5s ease;
        }

        .chat-card:hover::before {
            left: 100%;
        }

        .chat-card:hover {
            background: linear-gradient(135deg, rgba(20, 20, 45, 0.95), rgba(35, 35, 75, 0.9));
            border-color: rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 30px rgba(0, 255, 255, 0.2),
                0 0 20px rgba(0, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .chat-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .chat-avatar {
            width: 60px !important;
            height: 60px !important;
            border-radius: 50% !important;
            background: linear-gradient(135deg, #00ffff, #0080ff) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: white !important;
            font-weight: 700 !important;
            font-size: 1.5em !important;
            margin-right: 0 !important;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.4),
                0 4px 15px rgba(0, 128, 255, 0.3) !important;
            position: relative !important;
            overflow: hidden !important;
            flex-shrink: 0 !important;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .chat-avatar::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #0080ff, #00ffff);
            border-radius: 50%;
            z-index: -1;
            animation: neon-pulse 2s ease-in-out infinite;
        }

        @keyframes neon-pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .chat-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
            letter-spacing: 0.3px;
            margin: 0;
        }

        .chat-permissions {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .chats-grid {
                grid-template-columns: 1fr;
            }
            
            .chats-header {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div id="tgRequired" class="tg-required">
        Открой админ-панель через Telegram Mini App (иначе профиль не определяется).
    </div>

    <div id="toast" class="toast error" role="status" aria-live="polite">
        <div class="toast-title">Ошибка</div>
        <div id="toastText" class="toast-text"></div>
    </div>

    <div class="main-content">
        <h1 class="page-title">Админ-панель</h1>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) tg.BackButton.hide();
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
                if (tg.isExpanded) {
                    // Mini App уже раскрыт
                }
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) {
                const hasTg = !!window.Telegram?.WebApp;
                const banner = document.getElementById('tgRequired');
                if (banner) banner.style.display = 'block';
                console.warn('Telegram WebApp user not available. hasTg=', hasTg, 'initDataUnsafe=', window.Telegram?.WebApp?.initDataUnsafe);
                showError('Не удалось определить профиль Telegram. Открой админ-панель внутри Telegram Mini App.');
                return;
            }

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        let toastTimer = null;
        function showError(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.textContent = mapErrorToRu(message);
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        function mapErrorToRu(raw) {
            const msg = (raw || '').toString();
            const m = msg.toLowerCase();
            if (!m) return 'Произошла ошибка. Попробуйте ещё раз.';
            if (m.includes('access denied') || m.includes('403')) return 'Доступ запрещён. У вас нет прав.';
            if (m.includes('cannot') && m.includes('yourself')) return 'Нельзя выполнять это действие над собой.';
            if (m.includes('400')) return 'Некорректный запрос. Проверьте данные.';
            if (m.includes('500')) return 'Ошибка сервера. Попробуйте позже.';
            return msg;
        }

        updateUserProfile();

        // API functionality
        const API_BASE = 'https://ezh-dev.ru:3000';
        
        async function fetchUserAdminChats() {
            const user = getCurrentUser();
            if (!user) {
                showError('Пользователь не определен');
                return [];
            }

            try {
                const response = await fetch(`${API_BASE}/user-admin-chats/${user.id}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    return data.admin_chats || [];
                } else {
                    showError(data.message || 'Ошибка при загрузке чатов');
                    return [];
                }
            } catch (error) {
                console.error('Error fetching admin chats:', error);
                showError('Ошибка соединения с сервером');
                return [];
            }
        }

        async function fetchChatAvatar(chatId) {
            try {
                console.log(`DEBUG: Fetching avatar for chat_id: ${chatId}`);
                const response = await fetch(`${API_BASE}/chat-avatar/${chatId}`);
                const data = await response.json();
                
                console.log(`DEBUG: Avatar response:`, data);
                
                if (data.status === 'success' && data.avatar_url) {
                    console.log(`DEBUG: Avatar URL found: ${data.avatar_url}`);
                    return data.avatar_url;
                }
                console.log(`DEBUG: No avatar URL found for chat_id: ${chatId}`);
                return null;
            } catch (error) {
                console.error('Error fetching chat avatar:', error);
                return null;
            }
        }

        async function renderAdminChats(chats) {
            const mainContent = document.querySelector('.main-content');
            
            // Remove existing content if any
            const existingContainer = document.querySelector('.admin-chats-container');
            if (existingContainer) {
                existingContainer.remove();
            }

            const container = document.createElement('div');
            container.className = 'admin-chats-container';
            
            const header = document.createElement('div');
            header.className = 'chats-header';
            header.innerHTML = `
                <h2 class="chats-title">Мои админские чаты (${chats.length})</h2>
            `;
            
            const grid = document.createElement('div');
            grid.className = 'chats-grid';
            
            if (chats.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔐</div>
                        <div class="empty-state-text">У вас нет админских чатов</div>
                        <div class="empty-state-subtext">Вы не имеете административных прав ни в одном из чатов</div>
                    </div>
                `;
            } else {
                // Загружаем аватары параллельно
                const chatPromises = chats.map(async chat => {
                    const card = await createChatCard(chat);
                    return card;
                });
                
                const cards = await Promise.all(chatPromises);
                cards.forEach(card => grid.appendChild(card));
            }
            
            container.appendChild(header);
            container.appendChild(grid);
            mainContent.appendChild(container);
        }

        async function createChatCard(chat) {
            const card = document.createElement('div');
            card.className = 'chat-card';
            
            const chatName = chat.chat_name || `Chat ${chat.chat_id}`;
            const firstLetter = chatName.charAt(0).toUpperCase();
            
            console.log(`DEBUG: Creating card for chat: ${chatName} (ID: ${chat.chat_id})`);
            
            // Получаем аватар через наш API
            const chatAvatarUrl = await fetchChatAvatar(chat.chat_id);
            
            console.log(`DEBUG: Avatar URL for ${chatName}: ${chatAvatarUrl}`);
            
            card.onclick = () => {
                window.location.href = `chat_admin.html?chat_id=${chat.chat_id}`;
            };
            
            card.innerHTML = `
                <div class="chat-header">
                    <div class="chat-avatar" id="avatar-${chat.chat_id}">
                        ${chatAvatarUrl ? `<img src="${chatAvatarUrl}" alt="${chatName}" onerror="this.style.display='none'; this.parentElement.innerHTML='${firstLetter}'">` : firstLetter}
                    </div>
                    <div class="chat-title">${chatName}</div>
                    <div class="chat-permissions">
                        ${Object.values(chat.permissions).filter(p => p).length} прав доступно
                    </div>
                </div>
            `;
            
            return card;
        }

        // Load admin chats on page load
        async function loadAdminChats() {
            const chats = await fetchUserAdminChats();
            await renderAdminChats(chats);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAdminChats();
        });
    </script>
</body>
</html>
