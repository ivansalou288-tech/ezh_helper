<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 90px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
            }

            .user-avatar {
                width: 30px;
                height: 30px;
            }

            .user-name {
                font-size: 0.8em;
                max-width: 100px;
            }
        }

        .tg-required {
            display: none;
            max-width: 1000px;
            margin: 0 auto 20px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 82, 82, 0.4);
            background: rgba(255, 82, 82, 0.12);
            color: #ffb3b3;
            text-align: center;
            box-shadow: 0 0 18px rgba(255, 82, 82, 0.12);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.92);
            border: 1px solid rgba(124, 77, 255, 0.55);
            box-shadow: 0 0 22px rgba(124, 77, 255, 0.22);
            color: #fff;
            padding: 12px 14px;
            border-radius: 14px;
            z-index: 2000;
            max-width: min(560px, calc(100vw - 24px));
            display: none;
            backdrop-filter: blur(10px);
        }

        .toast.error {
            border-color: rgba(255, 82, 82, 0.6);
            box-shadow: 0 0 22px rgba(255, 82, 82, 0.18);
        }

        .toast-title {
            font-weight: 800;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .toast-text {
            opacity: 0.95;
            font-size: 0.9em;
            line-height: 1.35;
            word-break: break-word;
        }

        .main-content {
            padding: 20px;
            margin-top: 80px;
        }

        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 50px;
            font-size: 2.5em;
        }

        /* Стили для контейнера чатов */
        .chats-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .chats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .chats-title {
            font-size: 1.8em;
            color: #b388ff;
            font-weight: 700;
        }

        .add-chat-btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(179, 136, 255, 0.3);
        }

        .add-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(179, 136, 255, 0.4);
        }

        .chats-grid {
            display: grid;
            grid-template-columns: 1fr; /* Одна колонка для мобильных */
            gap: 15px;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .chat-card {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.9), rgba(25, 25, 55, 0.8));
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 25px;
            padding: 15px 20px;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 4px 20px rgba(0, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .chat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.15), 
                transparent);
            transition: left 0.5s ease;
        }

        .chat-card:hover::before {
            left: 100%;
        }

        .chat-card:hover {
            background: linear-gradient(135deg, rgba(20, 20, 45, 0.95), rgba(35, 35, 75, 0.9));
            border-color: rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 30px rgba(0, 255, 255, 0.2),
                0 0 20px rgba(0, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .chat-header {
            display: flex;
            align-items: center;
            margin-bottom: 0; /* Убираем отступ */
        }

        .chat-avatar {
            width: 45px !important;
            height: 45px !important;
            border-radius: 50% !important;
            background: linear-gradient(135deg, #00ffff, #0080ff) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: white !important;
            font-weight: 700 !important;
            font-size: 1.2em !important;
            margin-right: 15px !important;
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.4),
                0 3px 10px rgba(0, 128, 255, 0.3) !important;
            position: relative !important;
            overflow: hidden !important;
            flex-shrink: 0 !important;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .chat-avatar::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #0080ff, #00ffff);
            border-radius: 50%;
            z-index: -1;
            animation: neon-pulse 2s ease-in-out infinite;
        }

        @keyframes neon-pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .chat-info {
            flex: 1;
        }

        .chat-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
            letter-spacing: 0.3px;
        }

        .chat-username {
            color: rgba(0, 255, 255, 0.6);
            font-size: 0.85em;
            font-weight: 400;
        }

        .chat-stats {
            display: none; /* Скрываем статистику */
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .chats-grid {
                grid-template-columns: 1fr;
            }
            
            .chats-header {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
            
            .add-chat-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div id="tgRequired" class="tg-required">
        Открой админ-панель через Telegram Mini App (иначе профиль не определяется).
    </div>

    <div id="toast" class="toast error" role="status" aria-live="polite">
        <div class="toast-title">Ошибка</div>
        <div id="toastText" class="toast-text"></div>
    </div>

    <div class="main-content">
        <h1>Admin Panel</h1>
        
        <!-- Контейнер чатов -->
        <div class="chats-container">
            <div class="chats-header">
                <h2 class="chats-title">📱 Доступные чаты</h2>
            </div>
            
            <div id="chatsContent">
                <div class="loading">Загрузка чатов...</div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) tg.BackButton.hide();
                if (tg.MainButton) tg.MainButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) {
                const hasTg = !!window.Telegram?.WebApp;
                const banner = document.getElementById('tgRequired');
                if (banner) banner.style.display = 'block';
                console.warn('Telegram WebApp user not available. hasTg=', hasTg, 'initDataUnsafe=', window.Telegram?.WebApp?.initDataUnsafe);
                showError('Не удалось определить профиль Telegram. Открой админ-панель внутри Telegram Mini App.');
                return;
            }

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        let toastTimer = null;
        function showError(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.textContent = mapErrorToRu(message);
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        function mapErrorToRu(raw) {
            const msg = (raw || '').toString();
            const m = msg.toLowerCase();
            if (!m) return 'Произошла ошибка. Попробуйте ещё раз.';
            if (m.includes('access denied') || m.includes('403')) return 'Доступ запрещён. У вас нет прав.';
            if (m.includes('cannot') && m.includes('yourself')) return 'Нельзя выполнять это действие над собой.';
            if (m.includes('400')) return 'Некорректный запрос. Проверьте данные.';
            if (m.includes('500')) return 'Ошибка сервера. Попробуйте позже.';
            return msg;
        }

        updateUserProfile();

        // Функции для работы с чатами
        async function loadChats() {
            const chatsContent = document.getElementById('chatsContent');
            
            try {
                const response = await fetch('https://ezh-dev.ru:3000/api/chats', {
                    method: 'GET',
                    headers: {
                        'X-Telegram-Init-Data': window.Telegram?.WebApp?.initData || ''
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                displayChats(data.chats || []);

            } catch (error) {
                console.error('Error loading chats:', error);
                chatsContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-text">Не удалось загрузить чаты</div>
                        <div class="empty-state-subtext">${mapErrorToRu(error.message)}</div>
                    </div>
                `;
            }
        }

        function displayChats(chats) {
            const chatsContent = document.getElementById('chatsContent');
            
            if (!chats || chats.length === 0) {
                chatsContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-text">Нет доступных чатов</div>
                        <div class="empty-state-subtext">Добавьте первый чат с помощью кнопки выше</div>
                    </div>
                `;
                return;
            }

            const chatsGrid = document.createElement('div');
            chatsGrid.className = 'chats-grid';

            chats.forEach(chat => {
                const chatCard = createChatCard(chat);
                chatsGrid.appendChild(chatCard);
            });

            chatsContent.innerHTML = '';
            chatsContent.appendChild(chatsGrid);
        }

        function createChatCard(chat) {
            const card = document.createElement('div');
            card.className = 'chat-card';
            card.onclick = () => openChat(chat.chat_id);

            // Создаем аватарку
            const chatInitial = chat.chat_title ? chat.chat_title.charAt(0).toUpperCase() : '?';
            
            console.log('Creating chat card for:', chat);
            console.log('Chat initial:', chatInitial);
            console.log('Chat photo URL:', chat.chat_photo_url);
            
            card.innerHTML = `
                <div class="chat-header">
                    <div class="chat-avatar">
                        ${chat.chat_photo_url ? 
                            `<img src="${chat.chat_photo_url}" 
                                 onerror="this.style.display='none'; this.parentElement.innerHTML='${chatInitial}'" 
                                 alt="${chat.chat_title}">` : 
                            chatInitial}
                    </div>
                    <div class="chat-info">
                        <div class="chat-title">${chat.chat_title || 'Без названия'}</div>
                        ${chat.chat_username ? `<div class="chat-username">@${chat.chat_username}</div>` : ''}
                    </div>
                </div>
            `;

            return card;
        }

        function openChat(chatId) {
            // Переходим на страницу управления чатом
            window.location.href = `/chat-admin.html?chat_id=${chatId}`;
        }

        // Загружаем чаты при инициализации
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram?.WebApp) {
                loadChats();
                
                // Скрываем кнопку "Назад" на главной странице
                const tg = window.Telegram?.WebApp;
                if (tg && tg.BackButton) {
                    tg.BackButton.hide();
                }
            } else {
                // Если Telegram WebApp недоступен, все равно пробуем загрузить
                setTimeout(loadChats, 1000);
            }
        });
    </script>
</body>
</html>
