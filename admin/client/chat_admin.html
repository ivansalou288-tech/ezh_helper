<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель чата</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 95px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.92);
            border: 1px solid rgba(124, 77, 255, 0.55);
            box-shadow: 0 0 22px rgba(124, 77, 255, 0.22);
            color: #fff;
            padding: 12px 14px;
            border-radius: 14px;
            z-index: 2000;
            max-width: min(560px, calc(100vw - 24px));
            display: none;
            backdrop-filter: blur(10px);
        }

        .toast.error {
            border-color: rgba(255, 82, 82, 0.6);
            box-shadow: 0 0 22px rgba(255, 82, 82, 0.18);
        }

        .toast-title {
            font-weight: 800;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .toast-text {
            opacity: 0.95;
            font-size: 0.9em;
            line-height: 1.35;
            word-break: break-word;
        }

        .main-content {
            padding: 20px;
            margin-top: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 135px);
            justify-content: flex-start;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .chat-title {
            font-size: 2em;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 10px;
        }

        .chat-subtitle {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
        }

        .functions-grid {
            display: flex;
            flex-direction: column;
            gap: 0;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
        }

        .function-item {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 0;
            padding: 0;
            cursor: pointer;
            transition: background-color 0.2s ease;
            position: relative;
        }

        .function-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .function-item:active {
            background: rgba(255, 255, 255, 0.12);
        }

        .function-content {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            gap: 16px;
        }

        .function-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(179, 136, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #b388ff;
            flex-shrink: 0;
        }

        .function-text {
            flex: 1;
            text-align: left;
        }

        .function-name {
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .function-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.3;
        }

        .function-arrow {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            flex-shrink: 0;
        }

        .function-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 0 20px;
        }

        .function-item:last-child .function-divider {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #b388ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .function-content {
                padding: 14px 16px;
                gap: 12px;
            }
            
            .function-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
                border-radius: 8px;
            }
            
            .function-name {
                font-size: 15px;
            }
            
            .function-description {
                font-size: 13px;
            }
            
            .function-arrow {
                width: 18px;
                height: 18px;
                font-size: 14px;
            }
            
            .main-content {
                margin-top: 115px;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div id="toast" class="toast error" role="status" aria-live="polite">
        <div class="toast-title">Ошибка</div>
        <div id="toastText" class="toast-text"></div>
    </div>

    <div class="main-content">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Загрузка админ панели...</div>
        </div>

        <div id="chatContent" style="display: none;">
            <div class="chat-header">
                <h1 class="chat-title" id="chatTitle">Загрузка...</h1>
                <div class="chat-subtitle" id="chatSubtitle">Админ панель</div>
            </div>

            <div class="functions-grid" id="functionsGrid">
                <!-- Функции будут добавлены динамически -->
            </div>
        </div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                tg.requestFullscreen();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        window.location.href = 'index.html';
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
                if (tg.SettingsButton) tg.SettingsButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;
        let currentChatId = null;
        let currentPanelData = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        let toastTimer = null;
        function showError(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.textContent = message;
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        function showSuccess(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.textContent = message;
            toast.classList.remove('error');
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        // API functionality
        const API_BASE = 'https://ezh-dev.ru:3000';
        
        // Получаем ID чата из URL параметров
        function getChatIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('chat_id');
        }

        async function fetchChatAdminPanel(chatId, userId) {
            try {
                const response = await fetch(`${API_BASE}/chat-admin-panel/${chatId}/${userId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    return data;
                } else {
                    showError(data.message || 'Ошибка при загрузке админ панели');
                    return null;
                }
            } catch (error) {
                console.error('Error fetching admin panel:', error);
                showError('Ошибка соединения с сервером');
                return null;
            }
        }

        function getFunctionIcon(functionId) {
            const icons = {
                'see_users': '👥',
                'admin_functions': '⚙️',
                'warn_management': '⚠️',
                'recommendations': '⭐',
                'links': '🔗',
                'dk_functions': '🎯'
            };
            return icons[functionId] || '📋';
        }

        function renderFunctions(functions) {
            const grid = document.getElementById('functionsGrid');
            grid.innerHTML = '';
            
            functions.forEach((func, index) => {
                const item = document.createElement('div');
                item.className = 'function-item';
                item.onclick = () => handleFunctionClick(func);
                
                item.innerHTML = `
                    <div class="function-content">
                        <div class="function-icon">${getFunctionIcon(func.id)}</div>
                        <div class="function-text">
                            <div class="function-name">${func.name}</div>
                            <div class="function-description">${func.description}</div>
                        </div>
                        <div class="function-arrow">›</div>
                    </div>
                    <div class="function-divider"></div>
                `;
                
                grid.appendChild(item);
            });
        }

        async function handleFunctionClick(func) {
            if (func.id === 'see_users') {
                window.location.href = `see_users.html${window.location.search}`;
            } else if (func.id === 'admin_functions') {
                window.location.href = `admin_functions.html${window.location.search}`;
            } else if (func.id === 'warn_management') {
                window.location.href = `warn_management.html${window.location.search}`;
            } else if (func.id === 'recommendations') {
                window.location.href = `recommendations.html${window.location.search}`;
            } else if (func.id === 'links') {
                window.location.href = `links.html${window.location.search}`;
            } else if (func.id === 'dk_functions') {
                window.location.href = `dk_functions.html${window.location.search}`;
            } else {
                showSuccess(`Функция "${func.name}" в разработке`);
            }
        }

        async function loadAdminPanel() {
            const user = getCurrentUser();
            if (!user) {
                showError('Пользователь не определен');
                return;
            }
            
            currentChatId = getChatIdFromUrl();
            if (!currentChatId) {
                showError('ID чата не указан');
                return;
            }
            
            const panelData = await fetchChatAdminPanel(currentChatId, user.id);
            if (!panelData) return;
            
            currentPanelData = panelData;
            
            // Обновляем заголовок
            document.getElementById('chatTitle').textContent = panelData.chat_name;
            document.getElementById('chatSubtitle').textContent = `Админ панель • ${panelData.available_functions.length} доступных функций`;
            
            // Отображаем функции
            renderFunctions(panelData.available_functions);
            
            // Скрываем загрузку и показываем контент
            document.getElementById('loading').style.display = 'none';
            document.getElementById('chatContent').style.display = 'block';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateUserProfile();
            loadAdminPanel();
        });
    </script>
</body>
</html>
