<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление чатом</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-avatar-fallback {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            font-weight: 700;
            font-size: 0.9em;
            user-select: none;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-header {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.9), rgba(25, 25, 55, 0.8));
            border: 1px solid rgba(179, 136, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 20px rgba(179, 136, 255, 0.1);
        }

        .chat-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.5em;
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.4);
        }

        .chat-details h1 {
            font-size: 1.8em;
            color: #b388ff;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(179, 136, 255, 0.4);
        }

        .chat-details .chat-id {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            transform: translateY(-1px);
        }

        /* Стили для администраторов */
        .admins-section {
            margin-top: 30px;
        }

        .admins-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .admins-title {
            font-size: 1.5em;
            color: #b388ff;
            font-weight: 600;
        }

        .add-admin-btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(179, 136, 255, 0.3);
        }

        .add-admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(179, 136, 255, 0.4);
        }

        .admins-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .admin-card {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.9), rgba(25, 25, 55, 0.8));
            border: 1px solid rgba(179, 136, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 4px 20px rgba(179, 136, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .admin-card:hover {
            background: linear-gradient(135deg, rgba(20, 20, 45, 0.95), rgba(35, 35, 75, 0.9));
            border-color: rgba(179, 136, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 30px rgba(179, 136, 255, 0.2),
                0 0 20px rgba(179, 136, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .admin-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .admin-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2em;
            margin-right: 15px;
            box-shadow: 
                0 0 15px rgba(179, 136, 255, 0.4),
                0 3px 10px rgba(124, 77, 255, 0.3);
        }

        .admin-info {
            flex: 1;
        }

        .admin-name {
            font-size: 1.1em;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
            text-shadow: 0 0 8px rgba(179, 136, 255, 0.4);
        }

        .admin-id {
            color: rgba(179, 136, 255, 0.6);
            font-size: 0.85em;
            font-weight: 400;
        }

        .admin-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .admin-status.active {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .admin-status.inactive {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .admin-permissions {
            margin: 15px 0;
        }

        .permissions-title {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .permission-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .permission-tag {
            background: rgba(179, 136, 255, 0.1);
            color: #b388ff;
            border: 1px solid rgba(179, 136, 255, 0.3);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.75em;
            font-weight: 500;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .admin-btn {
            padding: 8px 16px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }

        .edit-btn:hover {
            background: rgba(33, 150, 243, 0.3);
            transform: translateY(-1px);
        }

        .delete-btn {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .delete-btn:hover {
            background: rgba(244, 67, 54, 0.3);
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.92);
            border: 1px solid rgba(124, 77, 255, 0.55);
            box-shadow: 0 0 22px rgba(124, 77, 255, 0.22);
            color: #fff;
            padding: 12px 14px;
            border-radius: 14px;
            z-index: 2000;
            max-width: min(560px, calc(100vw - 24px));
            display: none;
            backdrop-filter: blur(10px);
        }

        .toast.error {
            border-color: rgba(255, 82, 82, 0.6);
            box-shadow: 0 0 22px rgba(255, 82, 82, 0.18);
        }

        .toast-title {
            font-weight: 800;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .toast-text {
            opacity: 0.95;
            font-size: 0.9em;
            line-height: 1.35;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .admins-grid {
                grid-template-columns: 1fr;
            }
            
            .admins-header {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
            
            .add-admin-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userAvatarFallback" class="user-avatar-fallback"></div>
        <div id="userName" class="user-name"></div>
    </div>

    <div id="toast" class="toast error" role="status" aria-live="polite">
        <div class="toast-title">Ошибка</div>
        <div id="toastText" class="toast-text"></div>
    </div>

    <div class="chat-header">
        <div class="chat-info">
            <div class="chat-avatar" id="chatAvatar">C</div>
            <div class="chat-details">
                <h1 id="chatTitle">Загрузка...</h1>
                <div class="chat-id" id="chatId">Chat ID: --</div>
            </div>
        </div>
        <a href="/" class="back-btn">← Назад к чатам</a>
    </div>

    <div class="admins-section">
        <div class="admins-header">
            <h2 class="admins-title">👥 Администраторы чата</h2>
            <button class="add-admin-btn" id="addAdminBtn">+ Добавить администратора</button>
        </div>
        
        <div id="adminsContent">
            <div class="loading">Загрузка администраторов...</div>
        </div>
    </div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        window.location.href = '/';
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;
        let currentChatId = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const avatarFallback = document.getElementById('userAvatarFallback');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            const initials = ((user.first_name || '').slice(0, 1) + (user.last_name || '').slice(0, 1)).toUpperCase() || (user.username || '').slice(0, 2).toUpperCase() || '?';
            if (avatarFallback) avatarFallback.textContent = initials;

            const showFallback = () => {
                if (avatar) avatar.style.display = 'none';
                if (avatarFallback) avatarFallback.style.display = 'flex';
            };

            if (avatar) {
                avatar.onerror = showFallback;
            }

            if (user.photo_url) {
                if (avatarFallback) avatarFallback.style.display = 'none';
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                showFallback();
            }

            profile.style.display = 'flex';
        }

        let toastTimer = null;
        function showError(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.textContent = mapErrorToRu(message);
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        function showSuccess(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.textContent = message;
            toast.classList.remove('error');
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        function mapErrorToRu(raw) {
            const msg = (raw || '').toString();
            const m = msg.toLowerCase();
            if (!m) return 'Произошла ошибка. Попробуйте ещё раз.';
            if (m.includes('access denied') || m.includes('403')) return 'Доступ запрещён. У вас нет прав.';
            if (m.includes('cannot') && m.includes('yourself')) return 'Нельзя выполнять это действие над собой.';
            if (m.includes('400')) return 'Некорректный запрос. Проверьте данные.';
            if (m.includes('500')) return 'Ошибка сервера. Попробуйте позже.';
            return msg;
        }

        // Получение ID чата из URL
        function getChatIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const chatId = urlParams.get('chat_id');
            return chatId ? parseInt(chatId) : null;
        }

        // Загрузка информации о чате
        async function loadChatInfo() {
            const chatId = getChatIdFromUrl();
            if (!chatId) {
                showError('ID чата не указан');
                return;
            }

            currentChatId = chatId;

            try {
                const response = await fetch(`https://ezh-dev.ru:3000/api/chats`, {
                    method: 'GET',
                    headers: {
                        'X-Telegram-Init-Data': window.Telegram?.WebApp?.initData || ''
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const chat = data.chats.find(c => c.chat_id === chatId);
                
                if (chat) {
                    document.getElementById('chatTitle').textContent = chat.chat_title || 'Без названия';
                    document.getElementById('chatId').textContent = `Chat ID: ${chat.chat_id}`;
                    
                    const chatInitial = chat.chat_title ? chat.chat_title.charAt(0).toUpperCase() : 'C';
                    document.getElementById('chatAvatar').textContent = chatInitial;
                } else {
                    document.getElementById('chatTitle').textContent = 'Чат не найден';
                    document.getElementById('chatId').textContent = `Chat ID: ${chatId}`;
                }

            } catch (error) {
                console.error('Error loading chat info:', error);
                document.getElementById('chatTitle').textContent = 'Ошибка загрузки';
                document.getElementById('chatId').textContent = `Chat ID: ${chatId}`;
            }
        }

        // Загрузка администраторов чата
        async function loadChatAdmins() {
            const chatId = getChatIdFromUrl();
            if (!chatId) return;

            const adminsContent = document.getElementById('adminsContent');
            
            try {
                const response = await fetch(`https://ezh-dev.ru:3000/api/chats/${chatId}/admins`, {
                    method: 'GET',
                    headers: {
                        'X-Telegram-Init-Data': window.Telegram?.WebApp?.initData || ''
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                displayAdmins(data.admins || []);

            } catch (error) {
                console.error('Error loading chat admins:', error);
                adminsContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <div class="empty-state-text">Не удалось загрузить администраторов</div>
                        <div class="empty-state-subtext">${mapErrorToRu(error.message)}</div>
                    </div>
                `;
            }
        }

        function displayAdmins(admins) {
            const adminsContent = document.getElementById('adminsContent');
            
            if (!admins || admins.length === 0) {
                adminsContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <div class="empty-state-text">Нет администраторов</div>
                        <div class="empty-state-subtext">Добавьте первого администратора с помощью кнопки выше</div>
                    </div>
                `;
                return;
            }

            const adminsGrid = document.createElement('div');
            adminsGrid.className = 'admins-grid';

            admins.forEach(admin => {
                const adminCard = createAdminCard(admin);
                adminsGrid.appendChild(adminCard);
            });

            adminsContent.innerHTML = '';
            adminsContent.appendChild(adminsGrid);
        }

        function createAdminCard(admin) {
            const card = document.createElement('div');
            card.className = 'admin-card';

            const adminInitial = 'A';
            const statusClass = admin.is_active ? 'active' : 'inactive';
            const statusText = admin.is_active ? 'Активен' : 'Неактивен';
            
            card.innerHTML = `
                <div class="admin-header">
                    <div class="admin-avatar">${adminInitial}</div>
                    <div class="admin-info">
                        <div class="admin-name">Admin ID: ${admin.user_id}</div>
                        <div class="admin-id">Роль: ${admin.role}</div>
                    </div>
                    <div class="admin-status ${statusClass}">${statusText}</div>
                </div>
                <div class="admin-permissions">
                    <div class="permissions-title">Права:</div>
                    <div class="permission-tags">
                        ${admin.permissions.map(perm => `<span class="permission-tag">${perm}</span>`).join('')}
                    </div>
                </div>
                <div class="admin-actions">
                    <button class="admin-btn edit-btn" onclick="editAdmin(${admin.id})">Редактировать</button>
                    <button class="admin-btn delete-btn" onclick="deleteAdmin(${admin.id})">Удалить</button>
                </div>
            `;

            return card;
        }

        function editAdmin(adminId) {
            // TODO: Реализовать модальное окно редактирования
            alert('Редактирование администратора ID: ' + adminId);
        }

        async function deleteAdmin(adminId) {
            if (!confirm('Вы уверены, что хотите удалить этого администратора?')) {
                return;
            }

            const chatId = getChatIdFromUrl();
            if (!chatId) return;

            try {
                const response = await fetch(`https://ezh-dev.ru:3000/api/chats/${chatId}/admins/${adminId}`, {
                    method: 'DELETE',
                    headers: {
                        'X-Telegram-Init-Data': window.Telegram?.WebApp?.initData || ''
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                showSuccess(data.message);
                loadChatAdmins(); // Перезагружаем список

            } catch (error) {
                console.error('Error deleting admin:', error);
                showError(mapErrorToRu(error.message));
            }
        }

        // Добавление администратора
        document.getElementById('addAdminBtn').addEventListener('click', () => {
            // TODO: Реализовать модальное окно добавления
            const userId = prompt('Введите ID пользователя Telegram:');
            if (!userId) return;

            // Временно добавляем с базовыми правами
            addAdmin(parseInt(userId), ['send_messages']);
        });

        async function addAdmin(userId, permissions) {
            const chatId = getChatIdFromUrl();
            if (!chatId) return;

            try {
                const response = await fetch(`https://ezh-dev.ru:3000/api/chats/${chatId}/admins`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': window.Telegram?.WebApp?.initData || ''
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        permissions: permissions
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                showSuccess(data.message);
                loadChatAdmins(); // Перезагружаем список

            } catch (error) {
                console.error('Error adding admin:', error);
                showError(mapErrorToRu(error.message));
            }
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            updateUserProfile();
            loadChatInfo();
            loadChatAdmins();
        });
    </script>
</body>
</html>
