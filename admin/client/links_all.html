<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Все ссылки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0a;
        color: #fff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
      }
      .container {
        width: 100%;
        margin: 0;
        padding: 10px;
        padding-top: 80px;
      }
      .header {
        text-align: center;
        margin-bottom: 22px;
      }
      .title {
        font-size: 2em;
        color: #b388ff;
        text-shadow:
          0 0 20px #b388ff,
          0 0 40px #7c4dff;
        margin-bottom: 10px;
      }
      .subtitle {
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 20px;
      }

      .links-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin: 20px 0;
        font-size: 60px;
        border: 2px solid rgba(179, 136, 255, 0.6);
        border-radius: 8px;
        overflow: hidden;
      }
      .links-table th {
        background: rgba(179, 136, 255, 0.3);
        padding: 30px 12px;
        text-align: center;
        border-bottom: 2px solid rgba(179, 136, 255, 0.6);
        font-weight: 600;
        color: #b388ff;
        font-size: 60px;
        border-right: 1px solid rgba(179, 136, 255, 0.4);
      }
      .links-table th:last-child {
        border-right: none;
      }
      .links-table td {
        padding: 30px 12px;
        text-align: center;
        border-bottom: 1px solid rgba(179, 136, 255, 0.4);
        border-right: 1px solid rgba(179, 136, 255, 0.4);
        vertical-align: middle;
      }
      .links-table td:last-child {
        border-right: none;
      }
      .links-table tr:hover {
        background: rgba(179, 136, 255, 0.15);
      }
      .link-url {
        color: #00e5ff;
        text-decoration: none;
        word-break: break-all;
        font-size: 60px;
        line-height: 1.4;
        display: inline-block;
      }
      .link-url:hover {
        text-decoration: underline;
      }
      .activate-count {
        color: #4caf50;
        font-weight: 600;
        font-size: 60px;
      }
      .delete-btn {
        background: rgba(244, 67, 54, 0.8);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 40px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .delete-btn:hover {
        background: rgba(244, 67, 54, 1);
        transform: scale(1.05);
      }
      .delete-btn:active {
        transform: scale(0.95);
      }
      .no-links {
        text-align: center;
        padding: 40px 20px;
        color: rgba(255, 255, 255, 0.7);
      }

      /* Мобильная адаптация */
      @media (max-width: 480px) {
        .container {
          padding: 5px;
          padding-top: 60px;
        }
        .title {
          font-size: 1.5em;
        }
        .links-table {
          font-size: 20px;
        }
        .links-table th {
          padding: 10px 4px;
          font-size: 20px;
        }
        .links-table td {
          padding: 10px 4px;
        }
        .link-url {
          font-size: 20px;
        }
        .activate-count {
          font-size: 20px;
        }
        .delete-btn {
          font-size: 16px;
          padding: 6px 12px;
        }
      }

      .glass-panel {
        position: relative;
        margin-top: 18px;
        padding: 22px;
        border-radius: 18px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.1),
          rgba(255, 255, 255, 0.05)
        );
        border: 1px solid rgba(0, 229, 255, 0.28);
        box-shadow:
          0 0 0 1px rgba(255, 45, 253, 0.1) inset,
          0 12px 28px rgba(0, 0, 0, 0.45),
          0 0 26px rgba(0, 229, 255, 0.1),
          0 0 34px rgba(255, 45, 253, 0.08);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .glass-panel::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 18px;
        pointer-events: none;
        background:
          radial-gradient(
            1000px 260px at 15% 0%,
            rgba(0, 229, 255, 0.18),
            transparent 60%
          ),
          radial-gradient(
            900px 260px at 85% 100%,
            rgba(255, 45, 253, 0.14),
            transparent 55%
          );
        opacity: 0.95;
      }

      .placeholder {
        position: relative;
        text-align: center;
        padding: 48px 10px;
        color: rgba(255, 255, 255, 0.7);
      }
      .placeholder-icon {
        font-size: 3.2em;
        opacity: 0.55;
        margin-bottom: 12px;
      }
      .placeholder-text {
        font-size: 1.1em;
        font-weight: 700;
        margin-bottom: 6px;
        color: #e9f9ff;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.18);
      }
      .placeholder-subtext {
        font-size: 0.95em;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 class="title">Все ссылки</h1>
        <div class="subtitle">Список всех ссылок для чатов</div>
      </div>

      <div id="links-container">
        <div class="placeholder">
          <div class="placeholder-icon">🧾</div>
          <div class="placeholder-text">Загрузка ссылок...</div>
          <div class="placeholder-subtext">Получение данных с сервера</div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const tg = window.Telegram?.WebApp;
        if (!tg) return;

        try {
          tg.ready();
          tg.expand();
          tg.requestFullscreen();
          if (tg.setHeaderColor) tg.setHeaderColor("#0a0a0a");
          if (tg.setBackgroundColor) tg.setBackgroundColor("#0a0a0a");
          if (tg.BackButton) {
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
              window.location.href = "links.html" + window.location.search;
            });
          }
          if (tg.MainButton) tg.MainButton.hide();
          if (tg.SettingsButton) tg.SettingsButton.hide();
        } catch (_) {
          // ignore
        }

        // Загрузка и отображение всех ссылок
        async function loadAllLinks() {
          try {
            // Получаем параметры из URL
            const urlParams = new URLSearchParams(window.location.search);
            const chatId = urlParams.get("chat_id");

            // Запрашиваем все ссылки с сервера
            const response = await fetch(
              `https://ezh-dev.ru:3000/api/links/all${chatId ? `?chat_id=${chatId}` : ""}`,
            );

            if (!response.ok) {
              throw new Error("Ошибка при загрузке ссылок");
            }

            const data = await response.json();
            displayLinks(data.links);
          } catch (error) {
            console.error("Ошибка:", error);
            showError("Не удалось загрузить ссылки");
          }
        }

        function displayLinks(links) {
          const container = document.getElementById("links-container");

          if (!links || links.length === 0) {
            container.innerHTML = `
              <div class="no-links">
                <div class="placeholder-icon">🔗</div>
                <div class="placeholder-text">Нет доступных ссылок</div>
                <div class="placeholder-subtext">Ссылки для чатов не найдены</div>
              </div>
            `;
            return;
          }

          const tableHTML = `
            <table class="links-table">
              <thead>
                <tr>
                  <th>Ссылка</th>
                  <th>Активации</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody>
                ${links
                  .map(
                    (link) => `
                  <tr id="link-row-${link.link}">
                    <td>
                      <span class="link-url" onclick="copyToClipboard('${link.link}', event)" style="cursor: pointer;">${link.link}</span>
                    </td>
                    <td><span class="activate-count">${link.activate_cnt || 0}</span></td>
                    <td>
                      <button class="delete-btn" onclick="deleteLink('${link.link}', '${link.chat_id}')">Удалить</button>
                    </td>
                  </tr>
                `,
                  )
                  .join("")}
              </tbody>
            </table>
          `;

          container.innerHTML = tableHTML;
        }

        function deleteLink(link, chatId) {
          if (confirm(`Удалить ссылку ${link}?`)) {
            // Сначала проверяем доступность сервера
            fetch(`https://ezh-dev.ru:3000/api/links/test`)
              .then(testResponse => {
                console.log('Server test response:', testResponse.status);
                if (!testResponse.ok) {
                  throw new Error('Сервер недоступен');
                }
                return testResponse.json();
              })
              .then(testData => {
                console.log('Server test data:', testData);
                // Если сервер работает, отправляем запрос на удаление
                return fetch(`https://ezh-dev.ru:3000/api/links/delete`, {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    link: link,
                    chat_id: parseInt(chatId),
                  }),
                });
              })
              .then((response) => {
                console.log("Delete response status:", response.status);
                return response.json();
              })
              .then((data) => {
                console.log("Delete response data:", data);
                if (data.status === "success") {
                  showNotification("Ссылка удалена!");
                  // Удаляем строку из таблицы
                  const row = document.getElementById(`link-row-${link}`);
                  if (row) {
                    row.remove();
                  }
                  // Если ссылок не осталось, показываем сообщение
                  const tbody = document.querySelector('.links-table tbody');
                  if (tbody && tbody.children.length === 0) {
                    loadAllLinks(); // Перезагружаем данные
                  }
                } else {
                  showNotification('Ошибка удаления: ' + data.message);
                }
              })
              .catch(error => {
                console.error('Ошибка:', error);
                showNotification('Ошибка удаления ссылки: ' + error.message);
              });
          }
        }

        function copyToClipboard(text, event) {
          event.preventDefault();
          navigator.clipboard
            .writeText(text)
            .then(() => {
              // Показываем уведомление об успешном копировании
              showNotification("Ссылка скопирована!");
            })
            .catch((err) => {
              console.error("Ошибка копирования:", err);
            });
        }

        function showNotification(message) {
          const notification = document.createElement("div");
          notification.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 18px;
            z-index: 1000;
            animation: fadeInOut 2s ease-in-out;
          `;
          notification.textContent = message;

          const style = document.createElement("style");
          style.textContent = `
            @keyframes fadeInOut {
              0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
              20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
              80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
              100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            }
          `;
          document.head.appendChild(style);
          document.body.appendChild(notification);

          setTimeout(() => {
            document.body.removeChild(notification);
            document.head.removeChild(style);
          }, 2000);
        }

        function showError(message) {
          const container = document.getElementById("links-container");
          container.innerHTML = `
            <div class="no-links">
              <div class="placeholder-icon">⚠️</div>
              <div class="placeholder-text">Ошибка</div>
              <div class="placeholder-subtext">${message}</div>
            </div>
          `;
        }

        // Загружаем ссылки при загрузке страницы
        loadAllLinks();
      })();
    </script>
  </body>
</html>
