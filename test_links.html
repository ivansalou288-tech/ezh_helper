<!DOCTYPE html>
<html>
<head>
    <title>Test Links</title>
</head>
<body>
    <h1>Test Invite Links</h1>
    <button onclick="testLinks()">Test Links</button>
    <div id="result"></div>

    <script>
        async function testLinks() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // Тестируем новый эндпоинт
                const response = await fetch('https://ezh-dev.ru:3000/generate_invite_links_by_code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: 'test123',
                        telegram_id: 123456789,
                        username: 'testuser'
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <h2>Result:</h2>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>Error:</h2>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
